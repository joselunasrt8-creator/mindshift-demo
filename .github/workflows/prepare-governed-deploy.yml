name: prepare-governed-deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  prepare-governed-deploy-inputs:
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DEPLOY_ENVIRONMENT: production
      DEPLOY_INTENT: deploy_production
      DEPLOY_WORKFLOW: governed-deploy.yml
      PREPARE_WORKFLOW: prepare-governed-deploy.yml
      DEPLOY_REPO: ${{ github.repository }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
      WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
      WORKFLOW_SHA: ${{ github.sha }}
      WORKFLOW_REF: ${{ github.ref }}
      WORKFLOW_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: HARD FAIL — Missing critical secrets
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "NULL — Only explicit invocation allowed"
            exit 1
          fi

          for var in WORKER_URL API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "NULL — Missing required variable: $var"
              exit 1
            fi
          done

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "NULL — Invalid WORKER_URL"
            exit 1
          fi

          case "$CALLER_WORKFLOW_REF" in
            */.github/workflows/$PREPARE_WORKFLOW@*) ;;
            *)
              echo "NULL — Workflow dispatch must enter through prepare-governed-deploy.yml"
              exit 1
              ;;
          esac

          if [ "$DEPLOY_ENVIRONMENT" != "production" ] || [ "$DEPLOY_INTENT" != "deploy_production" ] || [ "$DEPLOY_WORKFLOW" != "governed-deploy.yml" ]; then
            echo "NULL — Canonical authority binding mismatch"
            exit 1
          fi

          if [ "$DEPLOY_BRANCH" != "$WORKFLOW_REF_NAME" ]; then
            echo "NULL — Branch/ref_name mismatch"
            exit 1
          fi

          PREPARE_REPLAY_ID="$(printf '%s' "${GITHUB_REPOSITORY}|${PREPARE_WORKFLOW}|${WORKFLOW_RUN_ID}|${WORKFLOW_RUN_ATTEMPT}|${WORKFLOW_SHA}|${WORKFLOW_REF}" | sha256sum | awk '{print $1}')"
          echo "PREPARE_REPLAY_ID=$PREPARE_REPLAY_ID" >> "$GITHUB_ENV"
          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: SESSION — Create active deploy session
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o session.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/session" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n --arg identity_id "github_actions:${DEPLOY_REPO}:${WORKFLOW_RUN_ID}:${WORKFLOW_RUN_ATTEMPT}:${WORKFLOW_SHA}:${PREPARE_REPLAY_ID}" '{identity_id:$identity_id}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Session endpoint error"
            cat session.json
            exit 1
          fi

          SESSION_STATUS=$(jq -r '.status // empty' session.json)
          SESSION_ID=$(jq -r '.session_id // empty' session.json)
          if [ "$SESSION_STATUS" != "SESSION_ACTIVE" ] || [ -z "$SESSION_ID" ]; then
            echo "NULL — Session response is non-canonical"
            cat session.json
            exit 1
          fi

          echo "SESSION_ID=$SESSION_ID" >> "$GITHUB_ENV"

      - name: CONTINUITY — Create active deploy continuity
        run: |
          set -euo pipefail

          if [ -z "${SESSION_ID:-}" ]; then
            echo "NULL — Missing active session_id before continuity"
            exit 1
          fi

          DECISION_ID="$(uuidgen | tr '[:upper:]' '[:lower:]')"
          EXPIRY="$(date -u -d '+15 minutes' +%Y-%m-%dT%H:%M:%SZ)"

          RESPONSE_CODE=$(curl -sS -o continuity.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/continuity" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              --arg expires_at "$EXPIRY" \
              '{session_id:$session_id,authority_chain:[$decision_id],actor_chain:["github_actions"],scope:{environment:$environment},constraints:{repo:$repo,branch:$branch,workflow:$workflow,max_executions:1},expires_at:$expires_at}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Continuity endpoint error"
            cat continuity.json
            exit 1
          fi

          CONTINUITY_STATUS=$(jq -r '.status // empty' continuity.json)
          CONTINUITY_ID=$(jq -r '.continuity_id // empty' continuity.json)
          CONTINUITY_HASH=$(jq -r '.continuity_hash // empty' continuity.json)
          if [ "$CONTINUITY_STATUS" != "CONTINUITY_ACTIVE" ] || [ -z "$CONTINUITY_ID" ] || [ -z "$CONTINUITY_HASH" ]; then
            echo "NULL — Continuity response is non-canonical"
            cat continuity.json
            exit 1
          fi

          echo "DECISION_ID=$DECISION_ID" >> "$GITHUB_ENV"
          echo "CONTINUITY_ID=$CONTINUITY_ID" >> "$GITHUB_ENV"
          echo "CONTINUITY_HASH=$CONTINUITY_HASH" >> "$GITHUB_ENV"

      - name: AUTHORITY — Create deploy authority and decision
        run: |
          set -euo pipefail

          if [ -z "${SESSION_ID:-}" ]; then
            echo "NULL — Missing active session_id before authority"
            exit 1
          fi

          if [ -z "${DECISION_ID:-}" ] || [ -z "${CONTINUITY_ID:-}" ]; then
            echo "NULL — Missing continuity-bound decision before authority"
            exit 1
          fi

          EXPIRY="$(date -u -d '+15 minutes' +%Y-%m-%dT%H:%M:%SZ)"

          RESPONSE_CODE=$(curl -sS -o authority.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/authority" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg continuity_id "$CONTINUITY_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg owner "github_actions" \
              --arg intent "$DEPLOY_INTENT" \
              --arg expiry "$EXPIRY" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              '{session_id:$session_id,continuity_id:$continuity_id,decision_id:$decision_id,owner:$owner,intent:$intent,scope:{environment:$environment},constraints:{repo:$repo,branch:$branch,workflow:$workflow,max_executions:1},expiry:$expiry}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Authority endpoint error"
            cat authority.json
            exit 1
          fi

          AUTHORITY_DECISION_ID=$(jq -r '.decision_id // empty' authority.json)
          AUTHORITY_CONTINUITY_ID=$(jq -r '.continuity_id // empty' authority.json)
          if [ -z "$AUTHORITY_DECISION_ID" ] || [ "$AUTHORITY_DECISION_ID" != "$DECISION_ID" ]; then
            echo "NULL — Missing or mismatched decision_id from authority"
            cat authority.json
            exit 1
          fi

          if [ -z "$AUTHORITY_CONTINUITY_ID" ] || [ "$AUTHORITY_CONTINUITY_ID" != "$CONTINUITY_ID" ]; then
            echo "NULL — Missing or mismatched continuity_id from authority"
            cat authority.json
            exit 1
          fi

          echo "DECISION_ID=$DECISION_ID" >> "$GITHUB_ENV"

      - name: COMPILE — Resolve validated object hash
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o compile.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/compile" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n --arg decision_id "$DECISION_ID" '{decision_id:$decision_id}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Compile endpoint error"
            cat compile.json
            exit 1
          fi

          VALIDATED_OBJECT_HASH=$(jq -r '.validated_object_hash // empty' compile.json)
          if [ -z "$VALIDATED_OBJECT_HASH" ]; then
            echo "NULL — Missing validated_object_hash from compile"
            cat compile.json
            exit 1
          fi

          echo "VALIDATED_OBJECT_HASH=$VALIDATED_OBJECT_HASH" >> "$GITHUB_ENV"

      - name: GENERATE NONCE — Prepare invocation_nonce
        run: |
          set -euo pipefail
          INVOCATION_NONCE="$(uuidgen | tr '[:upper:]' '[:lower:]')"
          echo "INVOCATION_NONCE=$INVOCATION_NONCE" >> "$GITHUB_ENV"

      - name: PRINT — Manual inputs for governed-deploy.yml
        run: |
          set -euo pipefail

          echo "decision_id=$DECISION_ID"
          echo "validated_object_hash=$VALIDATED_OBJECT_HASH"
          echo "invocation_nonce=$INVOCATION_NONCE"

          {
            printf '%s\n\n' '### governed-deploy.yml manual inputs'
            printf '%s\n' '```text'
            printf 'decision_id=%s\n' "$DECISION_ID"
            printf 'validated_object_hash=%s\n' "$VALIDATED_OBJECT_HASH"
            printf 'invocation_nonce=%s\n' "$INVOCATION_NONCE"
          printf 'prepare_replay_id=%s\n' "$PREPARE_REPLAY_ID"
            printf '%s\n' '```'
          } >> "$GITHUB_STEP_SUMMARY"
