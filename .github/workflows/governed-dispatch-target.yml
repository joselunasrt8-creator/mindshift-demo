# STATUS: ACTIVE
# PURPOSE: Conduit receiver for governed dispatch execution
# NOTE: Executes only when triggered by validated repository_dispatch from MindShift boundary

name: governed-dispatch-target

on:
  repository_dispatch:
    types: [mindshift_execute]

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Enforce MindShift dispatch
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "repository_dispatch" ]; then
            echo "NULL"
            exit 1
          fi

          if [ "${{ github.event.action }}" != "mindshift_execute" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ github.event.client_payload.decision_id }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ github.event.client_payload.signature }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ github.event.client_payload.payload }}" ]; then
            echo "NULL"
            exit 1
          fi

      - name: Parse Payload
        id: payload
        run: |
          set -euo pipefail
          echo '${{ toJson(github.event.client_payload.payload) }}' > payload.json

      - name: Surface Execution (Example)
        run: |
          set -euo pipefail

          echo "Executing governed action"
          cat payload.json

          # Example action — replace with real surface
          curl -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0"

      - name: Write Proof-of-Transfer
        run: |
          set -euo pipefail

          mkdir -p proof

          jq -n \
            --arg decision_id "${{ github.event.client_payload.decision_id }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg repo "${{ github.repository }}" \
            --arg commit "${{ github.sha }}" \
            '{
              decision_id: $decision_id,
              run_id: $run_id,
              repo: $repo,
              commit: $commit,
              status: "VALID"
            }' > proof/proof.json

      - name: Upload Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: proof/proof.json