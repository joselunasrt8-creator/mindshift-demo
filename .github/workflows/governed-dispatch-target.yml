name: governed-dispatch-target

on:
  workflow_dispatch:
    inputs:
      decision_id:
        description: "MindShift decision id"
        required: true
        type: string
      validated_object_hash:
        description: "Hash approved by MindShift validator"
        required: true
        type: string

jobs:
  governed-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce MindShift workflow_dispatch payload
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.decision_id }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ inputs.validated_object_hash }}" ]; then
            echo "NULL"
            exit 1
          fi

          echo "VALID"

      - name: Simulated production deploy surface
        run: |
          echo "MindShift-governed deploy accepted"
          echo "decision_id=${{ inputs.decision_id }}"

      - name: Write proof artifact
        run: |
          mkdir -p proof
          cat > proof/github-proof.json <<EOF
          {
            "decision_id": "${{ inputs.decision_id }}",
            "validated_object_hash": "${{ inputs.validated_object_hash }}",
            "run_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: governed-dispatch-proof
          path: proof/github-proof.json
