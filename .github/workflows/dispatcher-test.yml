name: dispatcher-test

on:
  workflow_dispatch:
    inputs:
      decision_id:
        description: "Decision ID"
        required: true
        type: string
      signature:
        description: "Signature"
        required: true
        type: string
      payload:
        description: "Stringified JSON payload"
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate dispatcher inputs
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.decision_id }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ inputs.signature }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ inputs.payload }}" ]; then
            echo "NULL"
            exit 1
          fi

      - name: Build AEO
        run: |
          set -euo pipefail

          mkdir -p runtime

          cat > runtime/aeo.json <<EOF
          {
            "intent": "dispatch-test",
            "scope": {
              "surface": "github_actions"
            },
            "validation": {
              "decision_id": "${{ inputs.decision_id }}",
              "signature": "${{ inputs.signature }}"
            },
            "target": {
              "system": "github_actions",
              "workflow": "governed-dispatch-target.yml",
              "ref": "main"
            },
            "finality": {
              "proof_required": true,
              "proof_type": "proof-of-transfer"
            }
          }
          EOF

          cat runtime/aeo.json

      - name: Omega validation
        run: |
          set -euo pipefail

          if ! jq -e '.intent and .scope and .validation and .target and .finality' runtime/aeo.json > /dev/null; then
            echo "NULL"
            exit 1
          fi

          if [ "$(jq -r '.validation.decision_id' runtime/aeo.json)" != "${{ inputs.decision_id }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ "$(jq -r '.validation.signature' runtime/aeo.json)" != "${{ inputs.signature }}" ]; then
            echo "NULL"
            exit 1
          fi

          echo "VALID"

      - name: Trigger governed target workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const aeo = JSON.parse(fs.readFileSync('runtime/aeo.json', 'utf8'));

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "governed-dispatch-target.yml",
              ref: "main",
              inputs: {
                decision_id: "${{ inputs.decision_id }}",
                signature: "${{ inputs.signature }}",
                payload: JSON.stringify(aeo)
              }
            });

      - name: Record dispatcher proof
        run: |
          mkdir -p dispatcher-proof
          cat > dispatcher-proof/dispatcher.json <<EOF
          {
            "decision_id": "${{ inputs.decision_id }}",
            "signature": "${{ inputs.signature }}",
            "run_id": "${{ github.run_id }}",
            "repo": "${{ github.repository }}",
            "status": "DISPATCHED"
          }
          EOF

      - name: Upload dispatcher proof
        uses: actions/upload-artifact@v4
        with:
          name: dispatcher-proof
          path: dispatcher-proof/dispatcher.json