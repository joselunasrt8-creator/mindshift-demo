name: dispatcher-test

on:
  workflow_dispatch:
    inputs:
      decision_id:
        description: "Decision ID"
        required: true
        type: string
      signature:
        description: "Signature"
        required: true
        type: string
      payload:
        description: "Stringified JSON payload"
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      VALIDATOR_TOKEN: dev-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validator dependencies
        run: npm install

      - name: Validate dispatcher inputs
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.decision_id }}" ]; then
            echo "NULL"
            exit 1
          fi

          if [ -z "${{ inputs.payload }}" ]; then
            echo "NULL"
            exit 1
          fi

      - name: Build AEO
        run: |
          set -euo pipefail

          mkdir -p runtime

          EXPIRES_AT=$(date -u -d "+1 hour" +"%Y-%m-%dT%H:%M:%SZ")

          cat > runtime/aeo.json <<EOF
          {
            "intent": "dispatch-test",
            "scope": {
              "surface": "github_actions"
            },
            "validation": {
              "decision_id": "${{ inputs.decision_id }}",
              "signature": ""
            },
            "target": {
              "system": "github_actions",
              "workflow": "governed-dispatch-target.yml",
              "ref": "main"
            },
            "finality": {
              "proof_required": true,
              "proof_type": "proof-of-transfer"
            },
            "expires_at": "$EXPIRES_AT"
          }
          EOF

          cat runtime/aeo.json

      - name: Compute canonical signature
        run: |
          set -euo pipefail

          SIGNATURE=$(node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const aeo = JSON.parse(fs.readFileSync('runtime/aeo.json', 'utf8'));

            function canonicalJson(v) {
              if (v === null || typeof v !== 'object' || Array.isArray(v)) {
                return JSON.stringify(v);
              }
              return '{' + Object.keys(v).sort().map(k =>
                JSON.stringify(k) + ':' + canonicalJson(v[k])
              ).join(',') + '}';
            }

            process.stdout.write(
              crypto.createHash('sha256')
                .update('${{ inputs.decision_id }}' + canonicalJson(aeo))
                .digest('hex')
            );
          ")

          jq --arg sig "$SIGNATURE" '.validation.signature = $sig' runtime/aeo.json > runtime/aeo.tmp
          mv runtime/aeo.tmp runtime/aeo.json

          echo "VALIDATOR_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          cat runtime/aeo.json

      - name: Start validator server
        run: |
          node server.js > runtime/validator.log 2>&1 &
          echo $! > runtime/validator.pid

      - name: Wait for validator
        run: |
          set -euo pipefail

          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:3000/health > /dev/null; then
              echo "Validator ready"
              exit 0
            fi
            sleep 1
          done

          echo "Validator failed to start"
          cat runtime/validator.log || true
          exit 1

      - name: Call validator API
        run: |
          set -euo pipefail

          AEO=$(cat runtime/aeo.json)

          RESPONSE=$(curl -s -X POST http://127.0.0.1:3000/validate \
            -H "Authorization: Bearer $VALIDATOR_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg decision_id "${{ inputs.decision_id }}" \
              --arg signature "$VALIDATOR_SIGNATURE" \
              --argjson aeo "$AEO" \
              '{decision_id: $decision_id, signature: $signature, aeo: $aeo}')")

          echo "$RESPONSE" > runtime/validator-response.json
          cat runtime/validator-response.json

          STATUS=$(jq -r '.status' runtime/validator-response.json)

          if [ "$STATUS" != "VALID" ]; then
            echo "NULL"
            cat runtime/validator-response.json
            exit 1
          fi

          echo "VALID"

      - name: Trigger governed target workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const aeo = JSON.parse(fs.readFileSync('runtime/aeo.json', 'utf8'));

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "governed-dispatch-target.yml",
              ref: "main",
              inputs: {
                decision_id: "${{ inputs.decision_id }}",
                signature: aeo.validation.signature,
                payload: JSON.stringify(aeo)
              }
            });

      - name: Record dispatcher proof
        run: |
          mkdir -p dispatcher-proof
          cat > dispatcher-proof/dispatcher.json <<EOF
          {
            "decision_id": "${{ inputs.decision_id }}",
            "signature": "$VALIDATOR_SIGNATURE",
            "run_id": "${{ github.run_id }}",
            "repo": "${{ github.repository }}",
            "status": "DISPATCHED"
          }
          EOF

      - name: Upload dispatcher proof
        uses: actions/upload-artifact@v4
        with:
          name: dispatcher-proof
          path: dispatcher-proof/dispatcher.json