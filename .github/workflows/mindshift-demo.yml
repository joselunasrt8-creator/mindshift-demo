name: mindshift-demo

on:
  workflow_dispatch:
  pull_request:

jobs:
  governed-run:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Authority
        run: |
          echo "Checking Decision ID..."

          if [ -z "${{ secrets.DECISION_ID }}" ]; then
            echo "NULL — No Decision ID"
            exit 1
          fi

          if [ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]; then
            echo "NULL — Invalid Decision ID"
            exit 1
          fi

          echo "Checking Signature..."

          if [ -z "${{ secrets.SIGNATURE }}" ]; then
            echo "NULL — Missing Signature"
            exit 1
          fi

          if [ "${{ secrets.SIGNATURE }}" != "demo-signature-v1" ]; then
            echo "NULL — Invalid Signature"
            exit 1
          fi

          echo "Checking Repo..."

          if [ "${{ github.event.repository.name }}" != "mindshift-demo" ]; then
            echo "NULL — Invalid Repo"
            exit 1
          fi

          echo "Checking Branch..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" != "main" ]; then
              echo "NULL — Invalid Base Branch"
              exit 1
            fi
          else
            if [ "${{ github.ref_name }}" != "main" ]; then
              echo "NULL — Invalid Branch"
              exit 1
            fi
          fi

          echo "VALID — Authority accepted"

      - name: Execute Webhook
        run: |
          curl -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "mindshift_governed_execution",
              "decision_id": "${{ secrets.DECISION_ID }}",
              "run_id": "${{ github.run_id }}",
              "commit": "${{ github.sha }}"
            }'

      - name: Proof-of-Transfer
        run: |
          echo "PoT"
          echo "Run ID: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"
          echo "Webhook delivered"