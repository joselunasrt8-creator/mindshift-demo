# Existing content of mindshift-demo.yml with the new step inserted

- name: Resolve validator URL
  run: |
    if [ "${USE_LOCAL_VALIDATOR}" = "true" ]; then
      echo "Using local validator"
      echo "VALIDATOR_URL=http://localhost:3000" >> $GITHUB_ENV
    else
      if [ -z "${VALIDATOR_URL:-}" ]; then
        echo "VALIDATOR_URL is unset and USE_LOCAL_VALIDATOR=false"
        exit 1
      fi
      echo "Using external validator: $VALIDATOR_URL"
    fi

- name: Call Validator API
  run: |
    ...