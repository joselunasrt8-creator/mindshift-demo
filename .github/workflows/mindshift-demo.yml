name: mindshift-demo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Decision (Real Rules)
        run: |
          echo "Checking Decision..."

          if [ -z "${{ secrets.DECISION_ID }}" ]; then
            echo "NULL — No Decision ID"
            exit 1
          fi

          if [ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]; then
            echo "NULL — Invalid Decision ID"
            exit 1
          fi

          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "NULL — Invalid Branch"
            exit 1
          fi

          if [ "${{ github.event.repository.name }}" != "mindshift-demo" ]; then
            echo "NULL — Invalid Repo"
            exit 1
          fi

          echo "VALID — All checks passed"

      - name: Deploy (Simulated)
        run: |
          echo "VALID — Deploying"
          echo "Deployment complete"