name: MindShift Demo Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Decision
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Debug + Validate Decision
        run: |
          echo "DECISION_ID present?"
          if [ -z "${{ secrets.DECISION_ID }}" ]; then
            echo "NULL — No Decision ID"
            exit 1
          fi

          echo "SIGNATURE present?"
          if [ -z "${{ secrets.SIGNATURE }}" ]; then
            echo "NULL — Missing Signature"
            exit 1
          fi

          echo "Expected Decision: MS-DEMO-DEPLOY-001"
          echo "Actual Decision: ${{ secrets.DECISION_ID }}"

          if [ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]; then
            echo "NULL — Invalid Decision ID"
            exit 1
          fi

          echo "Expected Signature: demo-signature-v1"
          echo "Actual Signature: ${{ secrets.SIGNATURE }}"

          if [ "${{ secrets.SIGNATURE }}" != "demo-signature-v1" ]; then
            echo "NULL — Invalid Signature"
            exit 1
          fi

          echo "github.ref_name = ${{ github.ref_name }}"
          echo "github.base_ref = ${{ github.base_ref }}"
          echo "github.event.repository.name = ${{ github.event.repository.name }}"
          echo "github.event_name = ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [ "$BRANCH" != "main" ]; then
            echo "NULL — Invalid Branch"
            exit 1
          fi

          if [ "${{ github.event.repository.name }}" != "mindshift-demo" ]; then
            echo "NULL — Invalid Repo"
            exit 1
          fi

          echo "VALID — Decision and signature accepted"