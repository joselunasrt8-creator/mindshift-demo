name: mindshift-demo

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Signed Authority
        run: |
          echo "Checking Decision ID..."

          if [ -z "${{ secrets.DECISION_ID }}" ]; then
            echo "NULL — Missing Decision ID"
            exit 1
          fi

          if [ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]; then
            echo "NULL — Invalid Decision ID"
            exit 1
          fi

          echo "Checking Signature..."

          if [ -z "${{ secrets.DECISION_SIGNATURE }}" ]; then
            echo "NULL — Missing Signature"
            exit 1
          fi

          if [ "${{ secrets.DECISION_SIGNATURE }}" != "SIG-MS-DEMO-DEPLOY-001-V1" ]; then
            echo "NULL — Invalid Signature"
            exit 1
          fi

          echo "Checking Branch..."

          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "NULL — Invalid Branch"
            exit 1
          fi

          echo "Checking Repository..."

          if [ "${{ github.event.repository.name }}" != "mindshift-demo" ]; then
            echo "NULL — Invalid Repo"
            exit 1
          fi

          echo "VALID — Signed authority verified"

      - name: Deploy (Simulated)
        run: |
          echo "Deploying..."
          echo "Deployment complete"

      - name: Proof-of-Transfer
        run: |
          echo "PoT"
          echo "Run ID: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"
