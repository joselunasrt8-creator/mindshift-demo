name: mindshift-demo

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Authority
        run: |
          echo "Checking Decision ID..."

          if [ -z "${{ secrets.DECISION_ID }}" ]; then
            echo "NULL — No Decision ID"
            exit 1
          fi

          if [ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]; then
            echo "NULL — Invalid Decision ID"
            exit 1
          fi

          echo "Checking Signature..."

          if [ -z "${{ secrets.SIGNATURE }}" ]; then
            echo "NULL — Missing Signature"
            exit 1
          fi

          if [ "${{ secrets.SIGNATURE }}" != "demo-signature-v1" ]; then
            echo "NULL — Invalid Signature"
            exit 1
          fi

          echo "Checking Repo..."

          if [ "${{ github.event.repository.name }}" != "mindshift-demo" ]; then
            echo "NULL — Invalid Repo"
            exit 1
          fi

          echo "Checking Branch..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" != "main" ]; then
              echo "NULL — Invalid Base Branch"
              exit 1
            fi
          else
            if [ "${{ github.ref_name }}" != "main" ]; then
              echo "NULL — Invalid Branch"
              exit 1
            fi
          fi

          echo "VALID — Authority accepted"

  execute-surface-1:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Execute Webhook
        run: |
          curl -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "mindshift_governed_execution",
              "surface": "webhook",
              "decision_id": "${{ secrets.DECISION_ID }}",
              "run_id": "${{ github.run_id }}",
              "commit": "${{ github.sha }}"
            }'

      - name: Write Surface-1 Proof
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping artifact"
            exit 1
          fi
          mkdir -p proof
          DECISION_ID_HASH=$(echo -n "$DECISION_ID" | sha256sum | cut -d' ' -f1)
          cat <<EOF > proof/surface-1.txt
          Surface: webhook
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          Decision ID (sha256): $DECISION_ID_HASH
          EOF

      - name: Upload Surface-1 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-surface-1
          path: proof/surface-1.txt

  execute-surface-2:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Execute API Surface
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping execution"
            exit 1
          fi
          echo "Executing governed action on API surface..."
          echo "Decision: ${{ github.run_id }} | Commit: ${{ github.sha }}"

      - name: Write Surface-2 Proof
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping artifact"
            exit 1
          fi
          mkdir -p proof
          DECISION_ID_HASH=$(echo -n "$DECISION_ID" | sha256sum | cut -d' ' -f1)
          cat <<EOF > proof/surface-2.txt
          Surface: api
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          Decision ID (sha256): $DECISION_ID_HASH
          EOF

      - name: Upload Surface-2 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-surface-2
          path: proof/surface-2.txt

  combine-proof:
    needs: [execute-surface-1, execute-surface-2]
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Download Surface-1 Artifact
        uses: actions/download-artifact@v4
        with:
          name: proof-surface-1
          path: proof

      - name: Download Surface-2 Artifact
        uses: actions/download-artifact@v4
        with:
          name: proof-surface-2
          path: proof

      - name: Combine Proof Artifacts
        run: |
          if [ ! -f proof/surface-1.txt ]; then
            echo "ERROR — proof/surface-1.txt is missing"
            exit 1
          fi
          if [ ! -f proof/surface-2.txt ]; then
            echo "ERROR — proof/surface-2.txt is missing"
            exit 1
          fi
          mkdir -p combined
          echo "=== Combined Proof of Transfer ===" > combined/proof.txt
          echo "" >> combined/proof.txt
          echo "--- Surface 1 (webhook) ---" >> combined/proof.txt
          cat proof/surface-1.txt >> combined/proof.txt
          echo "" >> combined/proof.txt
          echo "--- Surface 2 (api) ---" >> combined/proof.txt
          cat proof/surface-2.txt >> combined/proof.txt

      - name: Upload Combined Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: combined/proof.txt