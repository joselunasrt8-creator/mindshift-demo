name: mindshift-demo

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install

      - name: Start validator API
        run: node server.js > /tmp/validator.log 2>&1 &
        env:
          PORT: 3000

      - name: Wait for validator to be ready
        run: |
          for i in $(seq 1 10); do
            curl -s -o /dev/null http://localhost:3000/ && break
            sleep 1
          done

      - name: Call validator API
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          RESPONSE=$(curl -s -X POST http://localhost:3000/validate \
            -H "Content-Type: application/json" \
            -d "{
              \"decision_id\": \"$DECISION_ID\",
              \"signature\": \"$SIGNATURE\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"branch\": \"$BRANCH\",
              \"aeo\": {
                \"intent\": \"deploy\",
                \"scope\": \"production\",
                \"validation\": \"approved\",
                \"target\": \"api\",
                \"finality\": \"confirmed\"
              }
            }")

          echo "Validator response: $RESPONSE"

          if [ "$(echo "$RESPONSE" | jq -r '.status')" = "VALID" ]; then
            echo "VALID — Authority accepted"
          else
            echo "NULL — Validation failed"
            cat /tmp/validator.log
            exit 1
          fi

  execute-surface-1:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Execute Webhook
        run: |
          curl -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "mindshift_governed_execution",
              "surface": "webhook",
              "decision_id": "${{ secrets.DECISION_ID }}",
              "run_id": "${{ github.run_id }}",
              "commit": "${{ github.sha }}"
            }'

  execute-surface-2:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Execute API Surface
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping execution"
            exit 1
          fi
          echo "Executing governed action on API surface..."
          echo "Decision: ${{ github.run_id }} | Commit: ${{ github.sha }}"

  combine-proof:
    needs: [execute-surface-1, execute-surface-2]
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Generate proof-of-transfer.json
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — aborting"
            exit 1
          fi
          mkdir -p proof
          DECISION_ID_HASH=$(echo -n "$DECISION_ID" | sha256sum | cut -d' ' -f1)
          AEO_HASH=$(echo -n "$SIGNATURE" | sha256sum | cut -d' ' -f1)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > proof/proof-of-transfer.json <<EOF
{
  "run_id": "${{ github.run_id }}",
  "commit_sha": "${{ github.sha }}",
  "repository": "${{ github.repository }}",
  "timestamp": "$TIMESTAMP",
  "decision_id_hash": "$DECISION_ID_HASH",
  "aeo_hash": "$AEO_HASH",
  "execution_surfaces": ["webhook", "api"],
  "validation_status": "valid"
}
EOF

      - name: Upload Combined Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: proof/proof-of-transfer.json