name: Mindshift Demo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.validate.outputs.verdict }}
      decision_id: ${{ steps.validate.outputs.decision_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deterministic local validator
        id: validate
        shell: bash
        env:
          ACTUAL_BRANCH: ${{ github.base_ref || github.ref_name }}
        run: |
          set -euo pipefail

          DECISION_ID="${{ secrets.DECISION_ID }}"
          SIGNATURE="${{ secrets.SIGNATURE }}"
          EXPECTED_DECISION_ID="MS-DEMO-DEPLOY-001"
          EXPECTED_SIGNATURE="demo-signature-v1"
          EXPECTED_BRANCH="main"
          EXPECTED_REPO="mindshift-demo"

          if [ -z "${DECISION_ID:-}" ]; then
            echo "NULL — No Decision ID"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$DECISION_ID" != "$EXPECTED_DECISION_ID" ]; then
            echo "NULL — Invalid Decision ID"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "${SIGNATURE:-}" ]; then
            echo "NULL — Missing Signature"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$SIGNATURE" != "$EXPECTED_SIGNATURE" ]; then
            echo "NULL — Invalid Signature"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$ACTUAL_BRANCH" != "$EXPECTED_BRANCH" ]; then
            echo "NULL — Invalid Branch"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "${{ github.event.repository.name }}" != "$EXPECTED_REPO" ]; then
            echo "NULL — Invalid Repo"
            echo "verdict=NULL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "VALID — Decision and signature accepted"
          echo "verdict=VALID" >> "$GITHUB_OUTPUT"
          echo "decision_id=$DECISION_ID" >> "$GITHUB_OUTPUT"

  execute-surface-1:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.verdict == 'VALID'
    steps:
      - name: Execute surface 1
        run: |
          echo "VALID — Executing surface 1"
          echo "Deploy completed"

      - name: Save proof surface 1
        run: |
          mkdir -p proof
          cat > proof/surface1.json <<EOF
          {
            "surface": "surface-1",
            "decision_id": "${{ needs.validate.outputs.decision_id }}",
            "run_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "status": "executed"
          }
          EOF

      - name: Upload proof surface 1
        uses: actions/upload-artifact@v4
        with:
          name: proof-surface-1
          path: proof/surface1.json

  execute-surface-2:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.verdict == 'VALID'
    steps:
      - name: Execute surface 2
        run: |
          echo "VALID — Executing surface 2"
          echo "Webhook / secondary surface completed"

      - name: Save proof surface 2
        run: |
          mkdir -p proof
          cat > proof/surface2.json <<EOF
          {
            "surface": "surface-2",
            "decision_id": "${{ needs.validate.outputs.decision_id }}",
            "run_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "status": "executed"
          }
          EOF

      - name: Upload proof surface 2
        uses: actions/upload-artifact@v4
        with:
          name: proof-surface-2
          path: proof/surface2.json

  combine-proof:
    runs-on: ubuntu-latest
    needs:
      - validate
      - execute-surface-1
      - execute-surface-2
    if: needs.validate.outputs.verdict == 'VALID'
    steps:
      - name: Download proof artifacts
        uses: actions/download-artifact@v4
        with:
          path: proof

      - name: Combine proof
        run: |
          mkdir -p combined
          cat > combined/proof-of-transfer.json <<EOF
          {
            "decision_id": "${{ needs.validate.outputs.decision_id }}",
            "run_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "proof_type": "combined-proof-of-transfer",
            "surfaces": [
              "surface-1",
              "surface-2"
            ],
            "status": "VALID"
          }
          EOF

          echo "PoT"
          echo "Run ID: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"

      - name: Upload combined proof
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: combined/proof-of-transfer.json