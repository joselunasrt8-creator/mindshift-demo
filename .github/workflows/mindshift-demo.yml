name: mindshift-demo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Call Validator
        run: |
          RESPONSE=$(curl -s -X POST https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0 \
          -H "Content-Type: application/json" \
          -d '{"decision_id":"'"${{ secrets.DECISION_ID }}"'"}')

          echo "Validator response: $RESPONSE"

if [[ "${{ secrets.DECISION_ID }}" != "MS-DEMO-DEPLOY-001" ]]; then
            echo "NULL — Validator rejected"
            exit 1
          fi

      - name: Deploy (Simulated)
        run: |
          echo "VALID — Deploying"
          echo "Deployment complete"

      - name: Proof-of-Transfer
        run: |
          echo "PoT"
          echo "Run ID: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"
