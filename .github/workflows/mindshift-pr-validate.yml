name: mindshift-pr-validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: mindshift-pr-validate   # IMPORTANT: this is the status check name
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}

    steps:
      - name: Validate PR through MindShift
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL"
            exit 1
          fi

          CLEAN_WORKER_URL="${WORKER_URL%/}"

          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg base_branch "${{ github.event.pull_request.base.ref }}" \
            --arg head_branch "${{ github.event.pull_request.head.ref }}" \
            --arg commit_sha "${{ github.event.pull_request.head.sha }}" \
            '{repo: $repo, pr_number: $pr_number, base_branch: $base_branch, head_branch: $head_branch, commit_sha: $commit_sha}')

          STATUS_CODE=$(curl -sS -o pr-validate.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/validate-pr" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          read -r RESULT STATUS < <(jq -r '[.result // "", .status // ""] | @tsv' pr-validate.json)

          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -gt 299 ] || [ "$RESULT" != "VALID" ] || [ "$STATUS" != "VALID" ]; then
            echo "PR VALIDATION FAILED → MERGE BLOCKED"
            cat pr-validate.json
            exit 1
          fi

          echo "PR VALIDATION PASSED"