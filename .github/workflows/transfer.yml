name: transfer

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VALIDATOR_URL: http://localhost:3000

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install

      - name: Compile decision into AEO
        run: node compile-decision.js

      - name: Resolve VALIDATOR_URL
        env:
          SECRET_VALIDATOR_URL: ${{ secrets.VALIDATOR_URL }}
          VARS_VALIDATOR_URL: ${{ vars.VALIDATOR_URL }}
        run: |
          set -euo pipefail

          if [ -n "${SECRET_VALIDATOR_URL:-}" ]; then
            RESOLVED_URL="$SECRET_VALIDATOR_URL"
          elif [ -n "${VARS_VALIDATOR_URL:-}" ]; then
            RESOLVED_URL="$VARS_VALIDATOR_URL"
          else
            RESOLVED_URL="http://localhost:3000"
          fi

          if echo "$RESOLVED_URL" | grep -qE '(localhost|127\.0\.0\.1)'; then
            USE_LOCAL=true
          else
            USE_LOCAL=false
          fi

          echo "VALIDATOR_URL=$RESOLVED_URL" >> "$GITHUB_ENV"
          echo "USE_LOCAL_VALIDATOR=$USE_LOCAL" >> "$GITHUB_ENV"

      - name: Start validator API
        if: env.USE_LOCAL_VALIDATOR == 'true'
        run: node server.js > /tmp/validator.log 2>&1 &
        env:
          PORT: 3000
          VALIDATOR_TOKEN: ${{ secrets.VALIDATOR_TOKEN }}

      - name: Wait for validator
        if: env.USE_LOCAL_VALIDATOR == 'true'
        run: |
          set -euo pipefail

          for i in $(seq 1 10); do
            CLEAN_URL="${VALIDATOR_URL%/}"
            if curl -s -o /dev/null "$CLEAN_URL/health"; then
              echo "Validator ready"
              exit 0
            fi
            sleep 1
          done

          echo "Validator failed to start"
          cat /tmp/validator.log || true
          exit 1

      - name: Call validator API
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          VALIDATOR_TOKEN: ${{ secrets.VALIDATOR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DECISION_ID:-}" ]; then
            echo "DECISION_ID is unset — failing."
            exit 1
          fi

          if [ -z "${VALIDATOR_TOKEN:-}" ]; then
            echo "VALIDATOR_TOKEN is unset — failing."
            exit 1
          fi

          if [ -z "${VALIDATOR_URL:-}" ]; then
            echo "VALIDATOR_URL is unset — failing."
            exit 1
          fi

          if [ ! -f "aeo.json" ]; then
            echo "aeo.json not found — failing."
            exit 1
          fi

          if [ ! -f "signature.txt" ]; then
            echo "signature.txt not found — failing."
            exit 1
          fi

          AEO="$(cat aeo.json)"
          SIGNATURE="$(cat signature.txt | tr -d '\n')"

          CLEAN_URL="${VALIDATOR_URL%/}"
          RESPONSE="$(curl -s -w "\nHTTP_STATUS_CODE:%{http_code}" -X POST "$CLEAN_URL/validate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $VALIDATOR_TOKEN" \
            -d "$(jq -n \
                  --arg decision_id "$DECISION_ID" \
                  --arg signature "$SIGNATURE" \
                  --arg repo "${{ github.event.repository.name }}" \
                  --arg branch "${{ github.ref_name }}" \
                  --argjson aeo "$AEO" \
                  '{decision_id: $decision_id, signature: $signature, repo: $repo, branch: $branch, aeo: $aeo}')" )"

          echo "---- RAW RESPONSE ----"
          echo "$RESPONSE"
          echo "----------------------"

          HTTP_STATUS_CODE="$(echo "$RESPONSE" | awk -F: '/HTTP_STATUS_CODE/ {print $2}')"
          VALIDATOR_BODY="$(echo "$RESPONSE" | sed '/HTTP_STATUS_CODE/d')"

          if [ -z "$HTTP_STATUS_CODE" ]; then
            echo "Validator unreachable"
            exit 1
          fi

          if [ "$HTTP_STATUS_CODE" != "200" ]; then
            echo "Validation failed (HTTP $HTTP_STATUS_CODE)"
            echo "$VALIDATOR_BODY"
            exit 1
          fi

          STATUS="$(echo "$VALIDATOR_BODY" | jq -r '.status')"

          if [ "$STATUS" != "VALID" ]; then
            echo "Validation failed: $STATUS"
            echo "$VALIDATOR_BODY"
            exit 1
          fi

          echo "VALID — Authority accepted"

  transfer:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute Webhook
        run: |
          curl -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0"

      - name: Write Proof
        run: |
          mkdir -p proof
          jq -n \
            --arg run_id "${{ github.run_id }}" \
            --arg commit "${{ github.sha }}" \
            '{run_id: $run_id, commit: $commit, status: "VALID"}' \
            > proof/proof.json

      - name: Upload Proof
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: proof/proof.json

      - name: Verify System Lock
        run: |
          if [ ! -f "mindshift/lock.json" ]; then
            echo "Lock missing"
            exit 1
          fi
          echo "Lock present — baseline recorded"