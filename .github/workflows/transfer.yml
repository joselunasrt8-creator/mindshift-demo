name: transfer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install

      - name: Start validator API
        run: node server.js > /tmp/validator.log 2>&1 &
        env:
          PORT: 3000

      - name: Wait for validator to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -s -o /dev/null http://localhost:3000/; then
              exit 0
            fi
            sleep 1
          done
          echo "Validator API did not start within timeout" >&2
          exit 1

      - name: Call validator API
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/validate \
            -H "Content-Type: application/json" \
            -d "{
              \"decision_id\": \"$DECISION_ID\",
              \"signature\": \"$SIGNATURE\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"aeo\": {
                \"intent\": \"deploy\",
                \"scope\": \"production\",
                \"validation\": \"approved\",
                \"target\": \"api\",
                \"finality\": \"confirmed\"
              }
            }")

          echo "Validator response: $RESPONSE"

          if [ "$(echo "$RESPONSE" | jq -r '.status')" = "VALID" ]; then
            echo "VALID — Authority accepted"
          else
            echo "NULL — Validation failed"
            cat /tmp/validator.log
            exit 1
          fi

  transfer:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Execute Webhook
        run: |
          curl --fail -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "mindshift_governed_execution",
              "surface": "webhook",
              "decision_id": "${{ secrets.DECISION_ID }}",
              "run_id": "${{ github.run_id }}",
              "commit": "${{ github.sha }}"
            }'

      - name: Write Proof Artifact
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping artifact"
            exit 1
          fi
          mkdir -p proof
          DECISION_ID_HASH=$(echo -n "$DECISION_ID" | sha256sum | cut -d' ' -f1)
          AEO_HASH=$(echo -n "$SIGNATURE" | sha256sum | cut -d' ' -f1)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg run_id "${{ github.run_id }}" \
            --arg commit_sha "${{ github.sha }}" \
            --arg repository "${{ github.repository }}" \
            --arg timestamp "$TIMESTAMP" \
            --arg decision_id_hash "$DECISION_ID_HASH" \
            --arg aeo_hash "$AEO_HASH" \
            '{
              run_id: $run_id,
              commit_sha: $commit_sha,
              repository: $repository,
              timestamp: $timestamp,
              decision_id_hash: $decision_id_hash,
              aeo_hash: $aeo_hash,
              execution_surfaces: ["webhook"],
              validation_status: "valid"
            }' \
            > proof/proof-of-transfer.json

      - name: Upload Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: proof/proof-of-transfer.json
