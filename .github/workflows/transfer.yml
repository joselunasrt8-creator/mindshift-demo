name: transfer

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VALIDATOR_URL: http://localhost:3000

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install

      - name: Resolve VALIDATOR_URL
        env:
          SECRET_VALIDATOR_URL: ${{ secrets.VALIDATOR_URL }}
          VARS_VALIDATOR_URL: ${{ vars.VALIDATOR_URL }}
        run: |
          set -euo pipefail

          if [ -n "${SECRET_VALIDATOR_URL:-}" ]; then
            RESOLVED_URL="$SECRET_VALIDATOR_URL"
            echo "VALIDATOR_URL resolved from secret (external service)"
          elif [ -n "${VARS_VALIDATOR_URL:-}" ]; then
            RESOLVED_URL="$VARS_VALIDATOR_URL"
            echo "VALIDATOR_URL resolved from repository/environment variable"
          else
            RESOLVED_URL="http://localhost:3000"
            echo "VALIDATOR_URL resolved to local fallback: $RESOLVED_URL"
          fi

          if echo "$RESOLVED_URL" | grep -qE '(localhost|127\.0\.0\.1)'; then
            USE_LOCAL=true
          else
            USE_LOCAL=false
          fi

          echo "VALIDATOR_URL=$RESOLVED_URL" >> "$GITHUB_ENV"
          echo "USE_LOCAL_VALIDATOR=$USE_LOCAL" >> "$GITHUB_ENV"
          echo "Final VALIDATOR_URL=$RESOLVED_URL USE_LOCAL_VALIDATOR=$USE_LOCAL"

      - name: Start validator API
        if: env.USE_LOCAL_VALIDATOR == 'true'
        run: node server.js > /tmp/validator.log 2>&1 &
        env:
          PORT: 3000
          VALIDATOR_TOKEN: ${{ secrets.VALIDATOR_TOKEN }}

      - name: Wait for validator to be ready
        if: env.USE_LOCAL_VALIDATOR == 'true'
        run: |
          set -euo pipefail

          for i in $(seq 1 10); do
CLEAN_URL="${VALIDATOR_URL%/}"
if curl -s -o /dev/null "$CLEAN_URL/health"; then
              echo "Validator ready"
              exit 0
            fi
            sleep 1
          done

          echo "Validator API did not start within timeout" >&2
          [ -f /tmp/validator.log ] && cat /tmp/validator.log || true
          exit 1

      - name: Call validator API
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          VALIDATOR_TOKEN: ${{ secrets.VALIDATOR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DECISION_ID:-}" ]; then
            echo "DECISION_ID is unset — failing."
            exit 1
          fi

          if [ -z "${VALIDATOR_TOKEN:-}" ]; then
            echo "VALIDATOR_TOKEN is unset — failing."
            exit 1
          fi

          if [ -z "${VALIDATOR_URL:-}" ]; then
            echo "VALIDATOR_URL is unset — failing."
            exit 1
          fi

          if [ ! -f "aeo.json" ]; then
            echo "aeo.json not found — failing."
            exit 1
          fi

          AEO="$(cat aeo.json)"

          SIGNATURE="$(node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const aeo = JSON.parse(fs.readFileSync('./aeo.json', 'utf8'));
            function canonicalJson(v) {
              if (v === null || typeof v !== 'object' || Array.isArray(v)) return JSON.stringify(v);
              return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + canonicalJson(v[k])).join(',') + '}';
            }
            process.stdout.write(
              crypto.createHash('sha256').update(process.env.DECISION_ID + canonicalJson(aeo)).digest('hex')
            );
          ")"

CLEAN_URL="${VALIDATOR_URL%/}"
-X POST "$CLEAN_URL/validate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $VALIDATOR_TOKEN" \
            -d "$(jq -n \
                  --arg decision_id "$DECISION_ID" \
                  --arg signature "$SIGNATURE" \
                  --arg repo "${{ github.event.repository.name }}" \
                  --arg branch "${{ github.ref_name }}" \
                  --argjson aeo "$AEO" \
                  '{decision_id: $decision_id, signature: $signature, repo: $repo, branch: $branch, aeo: $aeo}')" )"

          HTTP_STATUS_CODE="$(echo "$RESPONSE" | awk -F: '/HTTP_STATUS_CODE/ {print $2}')"
          VALIDATOR_BODY="$(echo "$RESPONSE" | sed '/HTTP_STATUS_CODE/d')"

          echo "Resolved VALIDATOR_URL=$VALIDATOR_URL"
          echo "HTTP Status Code=$HTTP_STATUS_CODE"
          echo "Validator Response Body=$VALIDATOR_BODY"

          if [ -z "$HTTP_STATUS_CODE" ]; then
            echo "Validator may be unreachable."
            [ -f /tmp/validator.log ] && cat /tmp/validator.log || true
            exit 1
          fi

          if [ "$HTTP_STATUS_CODE" != "200" ]; then
            echo "Validation failed (HTTP $HTTP_STATUS_CODE)"
            echo "$VALIDATOR_BODY"
            [ -f /tmp/validator.log ] && cat /tmp/validator.log || true
            exit 1
          fi

          VALIDATION_STATUS="$(echo "$VALIDATOR_BODY" | jq -r '.status')"

          if [ "$VALIDATION_STATUS" != "VALID" ]; then
            echo "Validation failed: $VALIDATION_STATUS"
            echo "$VALIDATOR_BODY"
            [ -f /tmp/validator.log ] && cat /tmp/validator.log || true
            exit 1
          fi

          echo "VALID — Authority accepted"

  transfer:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute Webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://webhook.site/e0a659c1-d614-4db3-8855-88129ab304b0" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg event "mindshift_governed_execution" \
                  --arg surface "webhook" \
                  --arg decision_id "${{ secrets.DECISION_ID }}" \
                  --arg run_id "${{ github.run_id }}" \
                  --arg commit "${{ github.sha }}" \
                  '{event: $event, surface: $surface, decision_id: $decision_id, run_id: $run_id, commit: $commit}')")
          echo "Webhook response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "429" ]; then
            echo "Target is rate-limited — skipping webhook delivery"
            exit 0
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Webhook delivered successfully"
          else
            echo "Webhook failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Write Proof Artifact
        env:
          DECISION_ID: ${{ secrets.DECISION_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: |
          if [ -z "$DECISION_ID" ]; then
            echo "DECISION_ID is unset — skipping artifact"
            exit 1
          fi
          mkdir -p proof
          DECISION_ID_HASH=$(echo -n "$DECISION_ID" | sha256sum | cut -d' ' -f1)
          AEO_HASH=$(jq -c . aeo.json | sha256sum | cut -d' ' -f1)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPIRES_AT=$(jq -r '.expires_at' aeo.json)
          jq -n \
            --arg run_id "${{ github.run_id }}" \
            --arg commit_sha "${{ github.sha }}" \
            --arg repository "${{ github.repository }}" \
            --arg timestamp "$TIMESTAMP" \
            --arg decision_id_hash "$DECISION_ID_HASH" \
            --arg aeo_hash "$AEO_HASH" \
            --arg expires_at "$EXPIRES_AT" \
            --arg validated_at "$TIMESTAMP" \
            '{
              run_id: $run_id,
              commit_sha: $commit_sha,
              repository: $repository,
              timestamp: $timestamp,
              decision_id_hash: $decision_id_hash,
              aeo_hash: $aeo_hash,
              execution_surfaces: ["webhook"],
              validation_status: "valid",
              expires_at: $expires_at,
              validated_at: $validated_at
            }' \
            > proof/proof-of-transfer.json

      - name: Upload Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-of-transfer
          path: proof/proof-of-transfer.json

      - name: Verify System Lock
        run: |
          if [ ! -f "mindshift/lock.json" ]; then
            echo "Lock missing — system drift detected"
            exit 1
          fi
          echo "Lock present — baseline recorded"