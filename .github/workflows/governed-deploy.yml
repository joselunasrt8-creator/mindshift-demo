name: governed-deploy

on:
  # Only Worker-triggered entrypoint. No manual or push-based production deploys.
  repository_dispatch:
    types: [mindshift-governed-production-deploy]

concurrency:
  group: governed-deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DEPLOY_ENVIRONMENT: production
      WORKFLOW_NAME: ${{ github.workflow }}
      COMMIT_SHA: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}
      REPOSITORY: ${{ github.repository }}
      BRANCH: ${{ github.ref_name }}
      DISPATCH_DECISION_ID: ${{ github.event.client_payload.decision_id }}
      DISPATCH_VALIDATED_OBJECT_HASH: ${{ github.event.client_payload.validated_object_hash }}

    steps:
      - name: Enforce MindShift boundary-only trigger and production target
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "repository_dispatch" ]; then
            echo "Only repository_dispatch is allowed for production deploys."
            exit 1
          fi

          if [ "${{ github.event.action }}" != "mindshift-governed-production-deploy" ]; then
            echo "Unexpected dispatch action for production deploy."
            exit 1
          fi

          if [ "${{ github.event.client_payload.source }}" != "mindshift-boundary" ]; then
            echo "Production deploys must be dispatched by the MindShift boundary."
            exit 1
          fi

          if [ -z "${{ github.event.client_payload.decision_id }}" ] || [ -z "${{ github.event.client_payload.validated_object_hash }}" ]; then
            echo "Dispatch payload missing decision_id and/or validated_object_hash."
            exit 1
          fi

          if [ "$DEPLOY_ENVIRONMENT" != "production" ]; then
            echo "Environment must be exactly production."
            exit 1
          fi

      - name: Require MindShift worker URL
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL secret."
            exit 1
          fi

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "MINDSHIFT_WORKER_URL is invalid after normalization."
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: Require active authority (/authority)
        run: |
          set -euo pipefail

          AUTHORITY_STATUS_CODE=$(curl -sS -o authority.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/authority" \
            -D authority.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg decision_id "MS-DEMO-DEPLOY-001" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg workflow "governed-deploy.yml" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg repo "$REPOSITORY" \
              --arg branch "$BRANCH" \
              '{
                decision_id: $decision_id,
                aeo: {
                  intent: "deploy_production",
                  scope: { environment: $environment },
                  target: { system: "github_actions", repo: $repo, branch: $branch, workflow: $workflow },
                  commit_sha: $commit_sha
                }
              }')")

          AUTHORITY_STATUS=$(jq -r '.status // empty' authority.json)
          AUTHORITY_ID=$(jq -r '.authority_id // empty' authority.json)
          AUTHORITY_STATE=$(jq -r '.authority_state // empty' authority.json)

          if [ "$AUTHORITY_STATUS_CODE" -lt 200 ] || [ "$AUTHORITY_STATUS_CODE" -gt 299 ] || [ "$AUTHORITY_STATUS" != "VALID" ] || [ -z "$AUTHORITY_ID" ] || [ "$AUTHORITY_STATE" != "ACTIVE" ]; then
            echo "Authority is not ACTIVE and VALID."
            cat authority.json
            exit 1
          fi

          echo "AUTHORITY_ID=$AUTHORITY_ID" >> "$GITHUB_ENV"

      - name: Compile AEO (/compile)
        run: |
          set -euo pipefail

          COMPILE_STATUS_CODE=$(curl -sS -o compile.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/compile" \
            -D compile.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg authority_id "$AUTHORITY_ID" '{authority_id: $authority_id}')")

          COMPILE_STATUS=$(jq -r '.status // empty' compile.json)
          COMPILATION_ID=$(jq -r '.compilation_id // empty' compile.json)

          if [ "$COMPILE_STATUS_CODE" -lt 200 ] || [ "$COMPILE_STATUS_CODE" -gt 299 ] || [ "$COMPILE_STATUS" != "VALID" ] || [ -z "$COMPILATION_ID" ]; then
            echo "Compile failed."
            cat compile.json
            exit 1
          fi

          echo "COMPILATION_ID=$COMPILATION_ID" >> "$GITHUB_ENV"

      - name: Validate gate (/validate, fail closed)
        run: |
          set -euo pipefail

          VALIDATE_STATUS_CODE=$(curl -sS -o validate.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/validate" \
            -D validate.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg compilation_id "$COMPILATION_ID" '{compilation_id: $compilation_id}')")

          VALIDATION_STATUS=$(jq -r '.status // empty' validate.json)
          VALIDATION_RESULT=$(jq -r '.result // empty' validate.json)
          DECISION_ID=$(jq -r '.decision_id // empty' validate.json)
          EXECUTE_INTENT=$(jq -r '.intent // empty' validate.json)
          VALIDATED_OBJECT_HASH=$(jq -r '.validated_object_hash // empty' validate.json)

          if [ "$VALIDATE_STATUS_CODE" -lt 200 ] || [ "$VALIDATE_STATUS_CODE" -gt 299 ] || [ "$VALIDATION_STATUS" != "VALID" ] || [ "$VALIDATION_RESULT" != "VALID" ]; then
            echo "Validation is not VALID."
            cat validate.json
            exit 1
          fi

          if [ -z "$DECISION_ID" ] || [ -z "$EXECUTE_INTENT" ] || [ -z "$VALIDATED_OBJECT_HASH" ]; then
            echo "Validation response missing required fields."
            cat validate.json
            exit 1
          fi

          echo "DECISION_ID=$DECISION_ID" >> "$GITHUB_ENV"
          echo "EXECUTE_INTENT=$EXECUTE_INTENT" >> "$GITHUB_ENV"
          echo "VALIDATED_OBJECT_HASH=$VALIDATED_OBJECT_HASH" >> "$GITHUB_ENV"

          if [ "$DISPATCH_DECISION_ID" != "$DECISION_ID" ] || [ "$DISPATCH_VALIDATED_OBJECT_HASH" != "$VALIDATED_OBJECT_HASH" ]; then
            echo "Dispatch payload does not match validated decision artifacts."
            exit 1
          fi

      - name: Execute with exact-object discipline (/execute)
        run: |
          set -euo pipefail

          EXECUTE_STATUS_CODE=$(curl -sS -o execute.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/execute" \
            -D execute.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg authority_id "$AUTHORITY_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg intent "$EXECUTE_INTENT" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              '{authority_id: $authority_id, decision_id: $decision_id, intent: $intent, validated_object_hash: $validated_object_hash}')")

          EXECUTE_STATUS=$(jq -r '.status // empty' execute.json)
          EXECUTION_ID=$(jq -r '.execution_id // empty' execute.json)
          EXECUTED_OBJECT_HASH=$(jq -r '.executed_object_hash // empty' execute.json)
          AUTHORITY_STATE=$(jq -r '.authority_state // empty' execute.json)

          if [ "$EXECUTE_STATUS_CODE" -lt 200 ] || [ "$EXECUTE_STATUS_CODE" -gt 299 ] || [ "$EXECUTE_STATUS" != "VALID" ] || [ -z "$EXECUTION_ID" ] || [ -z "$EXECUTED_OBJECT_HASH" ]; then
            echo "Execute failed."
            cat execute.json
            exit 1
          fi

          if [ "$VALIDATED_OBJECT_HASH" != "$EXECUTED_OBJECT_HASH" ]; then
            echo "Hash mismatch: validated_object_hash != executed_object_hash"
            cat execute.json
            exit 1
          fi

          if [ "$AUTHORITY_STATE" != "CONSUMED" ]; then
            echo "Authority was not consumed after execution (replay protection failed)."
            cat execute.json
            exit 1
          fi

          echo "EXECUTION_ID=$EXECUTION_ID" >> "$GITHUB_ENV"
          echo "EXECUTED_OBJECT_HASH=$EXECUTED_OBJECT_HASH" >> "$GITHUB_ENV"

      - name: Record proof before success (/proof)
        run: |
          set -euo pipefail

          PROOF_STATUS_CODE=$(curl -sS -o proof.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/proof" \
            -D proof.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg execution_id "$EXECUTION_ID" \
              --arg run_id "$RUN_ID" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{execution_id: $execution_id, run_id: $run_id, commit_sha: $commit_sha, environment: $environment}')")

          PROOF_STATUS=$(jq -r '.status // empty' proof.json)
          PROOF_ID=$(jq -r '.proof.proof_id // empty' proof.json)

          if [ "$PROOF_STATUS_CODE" -lt 200 ] || [ "$PROOF_STATUS_CODE" -gt 299 ] || [ "$PROOF_STATUS" != "VALID" ] || [ -z "$PROOF_ID" ]; then
            echo "Proof recording failed."
            cat proof.json
            exit 1
          fi

      - name: Upload governance records
        uses: actions/upload-artifact@v4
        with:
          name: governed-deploy-records
          path: |
            authority.json
            compile.json
            validate.json
            execute.json
            proof.json
