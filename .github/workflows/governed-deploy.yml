name: governed-deploy

on:
  workflow_dispatch:
    inputs:
      decision_id:
        required: true
        type: string
      validated_object_hash:
        required: true
        type: string
      invocation_nonce:
        required: true
        type: string

concurrency:
  group: governed-deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DECISION_ID: ${{ github.event.inputs.decision_id }}
      VALIDATED_OBJECT_HASH: ${{ github.event.inputs.validated_object_hash }}
      INVOCATION_NONCE: ${{ github.event.inputs.invocation_nonce }}
      DEPLOY_ENVIRONMENT: production
      DEPLOY_INTENT: deploy_production
      DEPLOY_REPO: ${{ github.repository }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_WORKFLOW: governed-deploy.yml
      CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}

    steps:
      - name: HARD FAIL — Missing critical inputs or secrets
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "NULL — Only explicit invocation allowed"
            exit 1
          fi

          for var in DECISION_ID VALIDATED_OBJECT_HASH INVOCATION_NONCE WORKER_URL API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "NULL — Missing required variable: $var"
              exit 1
            fi
          done

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "NULL — Invalid WORKER_URL"
            exit 1
          fi

          case "$CALLER_WORKFLOW_REF" in
            */.github/workflows/$DEPLOY_WORKFLOW@*) ;;
            *)
              echo "NULL — Workflow dispatch must enter through governed-deploy.yml"
              exit 1
              ;;
          esac

          if [ "$DEPLOY_ENVIRONMENT" != "production" ] || [ "$DEPLOY_INTENT" != "deploy_production" ] || [ "$DEPLOY_WORKFLOW" != "governed-deploy.yml" ]; then
            echo "NULL — Canonical production workflow binding mismatch"
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: Save session response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o session.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/session" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n --arg identity_id "github_actions:$GITHUB_REPOSITORY:$GITHUB_RUN_ID" '{identity_id: $identity_id}')")

          echo "SESSION_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload session artifact
        uses: actions/upload-artifact@v4
        with:
          name: session
          path: session.json

      - name: Assert session response is canonical
        run: |
          set -euo pipefail

          if [ "$SESSION_RESPONSE_CODE" -lt 200 ] || [ "$SESSION_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Session endpoint error"
            cat session.json
            exit 1
          fi

          SESSION_STATUS=$(jq -r '.status // empty' session.json)
          SESSION_ID=$(jq -r '.session_id // empty' session.json)

          if [ "$SESSION_STATUS" != "SESSION_ACTIVE" ] || [ -z "$SESSION_ID" ]; then
            echo "NULL — Session response is non-canonical"
            cat session.json
            exit 1
          fi

          echo "SESSION_ID=$SESSION_ID" >> "$GITHUB_ENV"

      - name: Save continuity response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o continuity.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/continuity" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              --arg expires_at "$(date -u -d '+1 hour' '+%Y-%m-%dT%H:%M:%SZ')" \
              '{session_id: $session_id, authority_chain: [$decision_id], actor_chain: ["github_actions"], scope: {environment: $environment}, constraints: {repo: $repo, branch: $branch, workflow: $workflow, max_executions: 1}, expires_at: $expires_at}')")

          echo "CONTINUITY_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload continuity artifact
        uses: actions/upload-artifact@v4
        with:
          name: continuity
          path: continuity.json

      - name: Assert continuity response is canonical
        run: |
          set -euo pipefail

          if [ "$CONTINUITY_RESPONSE_CODE" -lt 200 ] || [ "$CONTINUITY_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Continuity endpoint error"
            cat continuity.json
            exit 1
          fi

          CONTINUITY_STATUS=$(jq -r '.status // empty' continuity.json)
          CONTINUITY_ID=$(jq -r '.continuity_id // empty' continuity.json)
          CONTINUITY_HASH=$(jq -r '.continuity_hash // empty' continuity.json)

          if [ "$CONTINUITY_STATUS" != "CONTINUITY_ACTIVE" ] || [ -z "$CONTINUITY_ID" ] || [ -z "$CONTINUITY_HASH" ]; then
            echo "NULL — Continuity response is non-canonical"
            cat continuity.json
            exit 1
          fi

          echo "CONTINUITY_ID=$CONTINUITY_ID" >> "$GITHUB_ENV"

      - name: Save authority response
        run: |
          set -euo pipefail

          if [ -z "${CONTINUITY_ID:-}" ]; then
            echo "NULL — Missing continuity before authority"
            exit 1
          fi

          RESPONSE_CODE=$(curl -sS -o authority.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/authority" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg continuity_id "$CONTINUITY_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg owner "github_actions" \
              --arg intent "$DEPLOY_INTENT" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              --arg expiry "$(date -u -d '+1 hour' '+%Y-%m-%dT%H:%M:%SZ')" \
              '{session_id: $session_id, continuity_id: $continuity_id, decision_id: $decision_id, owner: $owner, intent: $intent, scope: {environment: $environment}, constraints: {repo: $repo, branch: $branch, workflow: $workflow, max_executions: 1}, expiry: $expiry}')")

          echo "AUTHORITY_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload authority artifact
        uses: actions/upload-artifact@v4
        with:
          name: authority
          path: authority.json

      - name: Assert authority response is canonical
        run: |
          set -euo pipefail

          if [ "$AUTHORITY_RESPONSE_CODE" -lt 200 ] || [ "$AUTHORITY_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Authority endpoint error"
            cat authority.json
            exit 1
          fi

          AUTHORITY_STATUS=$(jq -r '.status // empty' authority.json)
          AUTHORITY_DECISION_ID=$(jq -r '.decision_id // empty' authority.json)
          AUTHORITY_CONTINUITY_ID=$(jq -r '.continuity_id // empty' authority.json)
          AUTHORITY_EXPIRY=$(jq -r '.expiry // .expires_at // empty' authority.json)

          if [ "$AUTHORITY_STATUS" = "NULL" ] || [ "$AUTHORITY_STATUS" != "ACTIVE" ] || [ "$AUTHORITY_DECISION_ID" != "$DECISION_ID" ]; then
            echo "NULL — Authority response is non-canonical"
            cat authority.json
            exit 1
          fi

          if [ -z "$AUTHORITY_CONTINUITY_ID" ] || [ "$AUTHORITY_CONTINUITY_ID" != "$CONTINUITY_ID" ]; then
            echo "NULL — Authority continuity binding is non-canonical"
            cat authority.json
            exit 1
          fi

          if [ -z "$AUTHORITY_EXPIRY" ]; then
            echo "NULL — Authority response missing expiry"
            cat authority.json
            exit 1
          fi

          echo "AUTHORITY_EXPIRY=$AUTHORITY_EXPIRY" >> "$GITHUB_ENV"

      - name: Save compile response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o compile.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/compile" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n --arg decision_id "$DECISION_ID" '{decision_id:$decision_id}')")

          echo "COMPILE_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload compile artifact
        uses: actions/upload-artifact@v4
        with:
          name: compile
          path: compile.json

      - name: Assert compile response is canonical
        run: |
          set -euo pipefail

          if [ "$COMPILE_RESPONSE_CODE" -lt 200 ] || [ "$COMPILE_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Compile endpoint error"
            cat compile.json
            exit 1
          fi

          COMPILE_STATUS=$(jq -r '.status // empty' compile.json)
          COMPILED_HASH=$(jq -r '.validated_object_hash // empty' compile.json)

          if [ "$COMPILE_STATUS" = "NULL" ] || [ "$COMPILE_STATUS" != "COMPILED" ]; then
            echo "NULL — Compile response is non-canonical"
            cat compile.json
            exit 1
          fi

          if [ -z "$COMPILED_HASH" ] || [ "$COMPILED_HASH" != "$VALIDATED_OBJECT_HASH" ]; then
            echo "NULL — compile hash mismatch"
            cat compile.json
            exit 1
          fi

      - name: Save validate response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o validate.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/validate" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              '{session_id: $session_id, decision_id: $decision_id, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce, environment: $environment, repo: $repo, branch: $branch, workflow: $workflow}')")

          echo "VALIDATE_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload validate artifact
        uses: actions/upload-artifact@v4
        with:
          name: validate
          path: validate.json

      - name: Assert validate response is canonical
        run: |
          set -euo pipefail

          if [ "$VALIDATE_RESPONSE_CODE" -lt 200 ] || [ "$VALIDATE_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Validation endpoint error"
            cat validate.json
            exit 1
          fi

          STATUS=$(jq -r '.status // empty' validate.json)
          RESULT=$(jq -r '.result // empty' validate.json)
          RETURNED_HASH=$(jq -r '.validated_object_hash // empty' validate.json)
          RETURNED_NONCE=$(jq -r '.invocation_nonce // empty' validate.json)
          REASON=$(jq -r '.reason // .failure_reason // empty' validate.json)
          REASONS=$(jq -r 'if (.reasons|type)=="array" then (.reasons|join(",")) else empty end' validate.json)

          if [ "$STATUS" = "NULL" ] || [ "$RESULT" != "VALID" ] || [ "$STATUS" != "VALID" ]; then
            if [ -z "$REASON" ] && [ -z "$REASONS" ]; then
              echo "NULL — Validation failed without reason"
              cat validate.json
              exit 1
            fi

            if ! jq -e '[.reason, .failure_reason, (.reasons[]?)] | map(select(type=="string")) | any(. == "expired_authority" or . == "scope_mismatch" or . == "hash_mismatch" or . == "replay_detected" or . == "nonce_invalid" or . == "workflow_mismatch")' validate.json >/dev/null; then
              echo "NULL — Validation failed with unrecognized reason"
              cat validate.json
              exit 1
            fi

            echo "NULL — Validation failed"
            cat validate.json
            exit 1
          fi

          if [ -z "$RETURNED_HASH" ] || [ "$RETURNED_HASH" != "$VALIDATED_OBJECT_HASH" ]; then
            echo "NULL — Hash mismatch"
            cat validate.json
            exit 1
          fi

          if [ -z "$RETURNED_NONCE" ] || [ "$RETURNED_NONCE" != "$INVOCATION_NONCE" ]; then
            echo "NULL — Invocation nonce not accepted/reserved"
            cat validate.json
            exit 1
          fi

      - name: Save execute response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o execute.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/execute" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg intent "$DEPLOY_INTENT" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              '{session_id: $session_id, decision_id: $decision_id, intent: $intent, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce, environment: $environment, repo: $repo, branch: $branch, workflow: $workflow}')")

          echo "EXECUTE_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload execute artifact
        uses: actions/upload-artifact@v4
        with:
          name: execute
          path: execute.json

      - name: Assert execute response is canonical
        run: |
          set -euo pipefail

          if [ "$EXECUTE_RESPONSE_CODE" -lt 200 ] || [ "$EXECUTE_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Execute endpoint error"
            cat execute.json
            exit 1
          fi

          EXEC_STATUS=$(jq -r '.status // empty' execute.json)
          EXECUTION_ID=$(jq -r '.execution_id // empty' execute.json)

          if [ "$EXEC_STATUS" = "NULL" ] || [ "$EXEC_STATUS" != "EXECUTED" ] || [ -z "$EXECUTION_ID" ]; then
            echo "NULL — Execution failed or response is non-canonical"
            cat execute.json
            exit 1
          fi

          echo "EXECUTION_ID=$EXECUTION_ID" >> "$GITHUB_ENV"

      - name: Save replay response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o replay.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/execute" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg intent "$DEPLOY_INTENT" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              '{session_id: $session_id, decision_id: $decision_id, intent: $intent, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce, environment: $environment, repo: $repo, branch: $branch, workflow: $workflow}')")

          echo "REPLAY_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload replay artifact
        uses: actions/upload-artifact@v4
        with:
          name: replay
          path: replay.json

      - name: Assert replay protection response is canonical
        run: |
          set -euo pipefail

          if [ "$REPLAY_RESPONSE_CODE" -lt 200 ] || [ "$REPLAY_RESPONSE_CODE" -gt 499 ]; then
            echo "NULL — Replay protection endpoint error"
            cat replay.json
            exit 1
          fi

          REPLAY_STATUS=$(jq -r '.status // empty' replay.json)
          REPLAY_RESULT=$(jq -r '.result // empty' replay.json)
          REPLAY_REASON=$(jq -r '.reason // empty' replay.json)

          if [ "$REPLAY_STATUS" != "NULL" ] || [ "$REPLAY_RESULT" != "INVALID" ]; then
            echo "NULL — Replay protection failed"
            cat replay.json
            exit 1
          fi

          case "$REPLAY_REASON" in
            replay_detected|authority_not_reserved) ;;
            *)
              echo "NULL — Replay protection failed with non-canonical reason"
              cat replay.json
              exit 1
              ;;
          esac

      - name: Save proof response
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o proof.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/proof" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg session_id "$SESSION_ID" \
              --arg continuity_id "$CONTINUITY_ID" \
              --arg execution_id "$EXECUTION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              --arg surface "github_actions" \
              --arg run_id "${{ github.run_id }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg workflow "$DEPLOY_WORKFLOW" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg repo "$DEPLOY_REPO" \
              --arg branch "$DEPLOY_BRANCH" \
              '{session_id: $session_id, continuity_id: $continuity_id, execution_id: $execution_id, decision_id: $decision_id, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce, surface: $surface, run_id: $run_id, commit_sha: $commit_sha, workflow: $workflow, environment: $environment, repo: $repo, branch: $branch}')")

          echo "PROOF_RESPONSE_CODE=$RESPONSE_CODE" >> "$GITHUB_ENV"

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof
          path: proof.json

      - name: Assert proof response is canonical
        run: |
          set -euo pipefail

          if [ "$PROOF_RESPONSE_CODE" -lt 200 ] || [ "$PROOF_RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Proof endpoint error"
            cat proof.json
            exit 1
          fi

          PROOF_STATUS=$(jq -r '.status // empty' proof.json)
          PROOF_ID=$(jq -r '.proof.proof_id // .proof_id // empty' proof.json)

          if [ "$PROOF_STATUS" = "NULL" ] || [ "$PROOF_STATUS" != "PROVEN" ] || [ -z "$PROOF_ID" ]; then
            echo "NULL — Missing required proof or response is non-canonical"
            cat proof.json
            exit 1
          fi


      - name: Build governed deploy legitimacy artifact
        run: |
          set -euo pipefail

          jq -n             --arg session_id "$SESSION_ID"             --arg decision_id "$DECISION_ID"             --arg invocation_nonce "$INVOCATION_NONCE"             --arg preo_status "VALID"             --arg continuity_status "VALID"             --arg validator_status "APPROVED"             --arg authority_status "ACTIVE"             --arg authority_expiry "$AUTHORITY_EXPIRY"             --arg proof_status "VALID"             --arg proof_binding_hash "$VALIDATED_OBJECT_HASH"             --arg proof_id "$PROOF_ID"             --arg validated_object_hash "$VALIDATED_OBJECT_HASH"             --arg deployment_hash "$VALIDATED_OBJECT_HASH"             --arg repo "$DEPLOY_REPO"             --arg branch "$DEPLOY_BRANCH"             --arg workflow "$DEPLOY_WORKFLOW"             --arg commit_sha "${{ github.sha }}"             '{session_id:$session_id,decision_id:$decision_id,invocation_nonce:$invocation_nonce,preo:{status:$preo_status},continuity:{status:$continuity_status,orphaned:false},validator:{status:$validator_status,approved:true},replay:{status:"INVALID",reused:false},authority:{status:$authority_status,expires_at:$authority_expiry},proof:{status:$proof_status,binding_hash:$proof_binding_hash,proof_id:$proof_id},validated_object_hash:$validated_object_hash,deployment_hash:$deployment_hash,deployment_target:{repo:$repo,branch:$branch,workflow:$workflow,commit:$commit_sha}}' > governed-deploy-artifact.json

      - name: Execute production deploy through governed wrapper only
        env:
          MINDSHIFT_GOVERNED_DEPLOY_CONTEXT: github_actions_governed
        run: |
          set -euo pipefail

          npx tsx scripts/governed-deploy.ts             governed-deploy-artifact.json             npx wrangler d"eploy" src/index.ts --config wrangler.toml
