name: governed-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (must be production)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      WORKFLOW_NAME: ${{ github.workflow }}
      COMMIT_SHA: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Require explicit production input
        run: |
          set -euo pipefail

          if [ "$DEPLOY_ENVIRONMENT" != "production" ]; then
            echo "Environment must be exactly 'production'."
            exit 1
          fi

      - name: Require MindShift worker URL
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL secret."
            exit 1
          fi

      - name: Create authority (Authority)
        run: |
          set -euo pipefail

          AUTHORITY_RESPONSE=$(curl -sS -X POST "$WORKER_URL/authority" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg decision_id "MS-DEMO-DEPLOY-001" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg workflow "$WORKFLOW_NAME" \
              --arg commit_sha "$COMMIT_SHA" \
              '{
                decision_id: $decision_id,
                aeo: {
                  intent: "deploy_production",
                  scope: { environment: $environment },
                  target: { system: "github_actions", workflow: $workflow },
                  commit_sha: $commit_sha
                }
              }')")

          echo "$AUTHORITY_RESPONSE" > authority.json

          AUTHORITY_STATUS=$(jq -r '.status // empty' authority.json)
          AUTHORITY_ID=$(jq -r '.authority_id // empty' authority.json)

          if [ "$AUTHORITY_STATUS" != "VALID" ] || [ -z "$AUTHORITY_ID" ]; then
            echo "Authority request failed."
            cat authority.json
            exit 1
          fi

          echo "AUTHORITY_ID=$AUTHORITY_ID" >> "$GITHUB_ENV"

      - name: Compile AEO (/compile)
        run: |
          set -euo pipefail

          COMPILE_RESPONSE=$(curl -sS -X POST "$WORKER_URL/compile" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg authority_id "$AUTHORITY_ID" '{authority_id: $authority_id}')")

          echo "$COMPILE_RESPONSE" > compile.json

          COMPILE_STATUS=$(jq -r '.status // empty' compile.json)
          COMPILATION_ID=$(jq -r '.compilation_id // empty' compile.json)

          if [ "$COMPILE_STATUS" != "VALID" ] || [ -z "$COMPILATION_ID" ]; then
            echo "Compile failed."
            cat compile.json
            exit 1
          fi

          echo "COMPILATION_ID=$COMPILATION_ID" >> "$GITHUB_ENV"

      - name: Validate (fail closed)
        run: |
          set -euo pipefail

          VALIDATE_RESPONSE=$(curl -sS -X POST "$WORKER_URL/validate" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg compilation_id "$COMPILATION_ID" '{compilation_id: $compilation_id}')")

          echo "$VALIDATE_RESPONSE" > validate.json

          VALIDATION_STATUS=$(jq -r '.status // empty' validate.json)
          VALIDATION_RESULT=$(jq -r '.result // empty' validate.json)
          VALIDATION_ID=$(jq -r '.validation_id // empty' validate.json)

          if [ "$VALIDATION_STATUS" != "VALID" ] && [ "$VALIDATION_RESULT" != "VALID" ]; then
            echo "Validation is not VALID. Failing closed."
            cat validate.json
            exit 1
          fi

          if [ -z "$VALIDATION_ID" ]; then
            echo "Validation did not return validation_id."
            cat validate.json
            exit 1
          fi

          echo "VALIDATION_ID=$VALIDATION_ID" >> "$GITHUB_ENV"

      - name: Execute only after VALID (/execute)
        run: |
          set -euo pipefail

          EXECUTE_RESPONSE=$(curl -sS -X POST "$WORKER_URL/execute" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg validation_id "$VALIDATION_ID" \
              --arg webhook_url "$WORKER_URL/webhook" \
              '{validation_id: $validation_id, webhook_url: $webhook_url}')")

          echo "$EXECUTE_RESPONSE" > execute.json

          EXECUTE_STATUS=$(jq -r '.status // empty' execute.json)
          EXECUTION_ID=$(jq -r '.execution_id // empty' execute.json)

          if [ "$EXECUTE_STATUS" != "VALID" ] || [ -z "$EXECUTION_ID" ]; then
            echo "Execute failed."
            cat execute.json
            exit 1
          fi

          echo "EXECUTION_ID=$EXECUTION_ID" >> "$GITHUB_ENV"

      - name: Record proof (/proof)
        run: |
          set -euo pipefail

          PROOF_RESPONSE=$(curl -sS -X POST "$WORKER_URL/proof" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg execution_id "$EXECUTION_ID" \
              --arg run_id "$RUN_ID" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg workflow "$WORKFLOW_NAME" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{
                execution_id: $execution_id,
                run_id: $run_id,
                commit_sha: $commit_sha,
                workflow: $workflow,
                environment: $environment
              }')")

          echo "$PROOF_RESPONSE" > proof.json

          PROOF_STATUS=$(jq -r '.status // empty' proof.json)
          PROOF_ID=$(jq -r '.proof.proof_id // empty' proof.json)

          if [ "$PROOF_STATUS" != "VALID" ] || [ -z "$PROOF_ID" ]; then
            echo "Proof recording failed."
            cat proof.json
            exit 1
          fi

      - name: Upload governance records
        uses: actions/upload-artifact@v4
        with:
          name: governed-deploy-records
          path: |
            authority.json
            compile.json
            validate.json
            execute.json
            proof.json
