name: governed-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (must be production)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      WORKFLOW_NAME: ${{ github.workflow }}
      COMMIT_SHA: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}
      REPOSITORY: ${{ github.repository }}
      BRANCH: ${{ github.ref_name }}

    steps:
      - name: Require explicit production input
        run: |
          set -euo pipefail

          if [ "$DEPLOY_ENVIRONMENT" != "production" ]; then
            echo "Environment must be exactly 'production'."
            exit 1
          fi

      - name: Require MindShift worker URL
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL secret."
            exit 1
          fi

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "MINDSHIFT_WORKER_URL is invalid after normalization."
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: Create authority (Authority)
        run: |
          set -euo pipefail

          AUTHORITY_STATUS_CODE=$(curl -sS -o authority.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/authority" \
            -D authority.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg decision_id "MS-DEMO-DEPLOY-001" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              --arg workflow "$WORKFLOW_NAME" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg repo "$REPOSITORY" \
              --arg branch "$BRANCH" \
              '{
                decision_id: $decision_id,
                aeo: {
                  intent: "deploy_production",
                  scope: { environment: $environment },
                  target: { system: "github_actions", repo: $repo, branch: $branch, workflow: $workflow },
                  commit_sha: $commit_sha
                }
              }')")

          AUTHORITY_CONTENT_TYPE=$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/\r$/, "", $2); print tolower($2)}' authority.headers | tail -n1)
          if [ "$AUTHORITY_CONTENT_TYPE" != "application/json" ]; then
            echo "Authority endpoint returned non-JSON content-type."
            echo "HTTP status: $AUTHORITY_STATUS_CODE"
            echo "Content-Type: ${AUTHORITY_CONTENT_TYPE:-missing}"
            cat authority.json
            exit 1
          fi

          if ! jq -e . authority.json >/dev/null 2>&1; then
            echo "Authority endpoint returned non-JSON response body."
            echo "HTTP status: $AUTHORITY_STATUS_CODE"
            cat authority.json
            exit 1
          fi

          AUTHORITY_STATUS=$(jq -r '.status // empty' authority.json)
          AUTHORITY_ID=$(jq -r '.authority_id // empty' authority.json)

          if [ "$AUTHORITY_STATUS_CODE" -lt 200 ] || [ "$AUTHORITY_STATUS_CODE" -gt 299 ] || [ "$AUTHORITY_STATUS" != "VALID" ] || [ -z "$AUTHORITY_ID" ]; then
            echo "Authority request failed."
            echo "HTTP status: $AUTHORITY_STATUS_CODE"
            cat authority.json
            exit 1
          fi

          echo "AUTHORITY_ID=$AUTHORITY_ID" >> "$GITHUB_ENV"

      - name: Compile AEO (/compile)
        run: |
          set -euo pipefail

          COMPILE_STATUS_CODE=$(curl -sS -o compile.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/compile" \
            -D compile.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg authority_id "$AUTHORITY_ID" '{authority_id: $authority_id}')")

          COMPILE_CONTENT_TYPE=$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/\r$/, "", $2); print tolower($2)}' compile.headers | tail -n1)
          if [ "$COMPILE_CONTENT_TYPE" != "application/json" ]; then
            echo "Compile endpoint returned non-JSON content-type."
            echo "HTTP status: $COMPILE_STATUS_CODE"
            echo "Content-Type: ${COMPILE_CONTENT_TYPE:-missing}"
            cat compile.json
            exit 1
          fi

          if ! jq -e . compile.json >/dev/null 2>&1; then
            echo "Compile endpoint returned non-JSON response body."
            echo "HTTP status: $COMPILE_STATUS_CODE"
            cat compile.json
            exit 1
          fi

          COMPILE_STATUS=$(jq -r '.status // empty' compile.json)
          COMPILATION_ID=$(jq -r '.compilation_id // empty' compile.json)

          if [ "$COMPILE_STATUS_CODE" -lt 200 ] || [ "$COMPILE_STATUS_CODE" -gt 299 ] || [ "$COMPILE_STATUS" != "VALID" ] || [ -z "$COMPILATION_ID" ]; then
            echo "Compile failed."
            echo "HTTP status: $COMPILE_STATUS_CODE"
            cat compile.json
            exit 1
          fi

          echo "COMPILATION_ID=$COMPILATION_ID" >> "$GITHUB_ENV"

      - name: Validate (fail closed)
        run: |
          set -euo pipefail

          VALIDATE_STATUS_CODE=$(curl -sS -o validate.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/validate" \
            -D validate.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n --arg compilation_id "$COMPILATION_ID" '{compilation_id: $compilation_id}')")

          VALIDATE_CONTENT_TYPE=$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/\r$/, "", $2); print tolower($2)}' validate.headers | tail -n1)
          if [ "$VALIDATE_CONTENT_TYPE" != "application/json" ]; then
            echo "Validate endpoint returned non-JSON content-type."
            echo "HTTP status: $VALIDATE_STATUS_CODE"
            echo "Content-Type: ${VALIDATE_CONTENT_TYPE:-missing}"
            cat validate.json
            exit 1
          fi

          if ! jq -e . validate.json >/dev/null 2>&1; then
            echo "Validate endpoint returned non-JSON response body."
            echo "HTTP status: $VALIDATE_STATUS_CODE"
            cat validate.json
            exit 1
          fi

          VALIDATION_STATUS=$(jq -r '.status // empty' validate.json)
          VALIDATION_RESULT=$(jq -r '.result // empty' validate.json)
          VALIDATION_ID=$(jq -r '.validation_id // empty' validate.json)

          if [ "$VALIDATE_STATUS_CODE" -lt 200 ] || [ "$VALIDATE_STATUS_CODE" -gt 299 ] || [ "$VALIDATION_STATUS" != "VALID" ] || [ "$VALIDATION_RESULT" != "VALID" ]; then
            echo "Validation is not VALID. Failing closed."
            echo "HTTP status: $VALIDATE_STATUS_CODE"
            cat validate.json
            exit 1
          fi

          if [ -z "$VALIDATION_ID" ]; then
            echo "Validation did not return validation_id."
            cat validate.json
            exit 1
          fi

          echo "VALIDATION_ID=$VALIDATION_ID" >> "$GITHUB_ENV"

      - name: Execute only after VALID (/execute)
        run: |
          set -euo pipefail

          EXECUTE_STATUS_CODE=$(curl -sS -o execute.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/execute" \
            -D execute.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg validation_id "$VALIDATION_ID" \
              --arg webhook_url "$CLEAN_WORKER_URL/webhook" \
              '{validation_id: $validation_id, webhook_url: $webhook_url}')")

          EXECUTE_CONTENT_TYPE=$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/\r$/, "", $2); print tolower($2)}' execute.headers | tail -n1)
          if [ "$EXECUTE_CONTENT_TYPE" != "application/json" ]; then
            echo "Execute endpoint returned non-JSON content-type."
            echo "HTTP status: $EXECUTE_STATUS_CODE"
            echo "Content-Type: ${EXECUTE_CONTENT_TYPE:-missing}"
            cat execute.json
            exit 1
          fi

          if ! jq -e . execute.json >/dev/null 2>&1; then
            echo "Execute endpoint returned non-JSON response body."
            echo "HTTP status: $EXECUTE_STATUS_CODE"
            cat execute.json
            exit 1
          fi

          EXECUTE_STATUS=$(jq -r '.status // empty' execute.json)
          EXECUTION_ID=$(jq -r '.execution_id // empty' execute.json)

          if [ "$EXECUTE_STATUS_CODE" -lt 200 ] || [ "$EXECUTE_STATUS_CODE" -gt 299 ] || [ "$EXECUTE_STATUS" != "VALID" ] || [ -z "$EXECUTION_ID" ]; then
            echo "Execute failed."
            echo "HTTP status: $EXECUTE_STATUS_CODE"
            cat execute.json
            exit 1
          fi

          echo "EXECUTION_ID=$EXECUTION_ID" >> "$GITHUB_ENV"

      - name: Record proof (/proof)
        run: |
          set -euo pipefail

          PROOF_STATUS_CODE=$(curl -sS -o proof.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/proof" \
            -D proof.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg execution_id "$EXECUTION_ID" \
              --arg run_id "$RUN_ID" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg workflow "$WORKFLOW_NAME" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{
                execution_id: $execution_id,
                run_id: $run_id,
                commit_sha: $commit_sha,
                workflow: $workflow,
                environment: $environment
              }')")

          PROOF_CONTENT_TYPE=$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/\r$/, "", $2); print tolower($2)}' proof.headers | tail -n1)
          if [ "$PROOF_CONTENT_TYPE" != "application/json" ]; then
            echo "Proof endpoint returned non-JSON content-type."
            echo "HTTP status: $PROOF_STATUS_CODE"
            echo "Content-Type: ${PROOF_CONTENT_TYPE:-missing}"
            cat proof.json
            exit 1
          fi

          if ! jq -e . proof.json >/dev/null 2>&1; then
            echo "Proof endpoint returned non-JSON response body."
            echo "HTTP status: $PROOF_STATUS_CODE"
            cat proof.json
            exit 1
          fi

          PROOF_STATUS=$(jq -r '.status // empty' proof.json)
          PROOF_ID=$(jq -r '.proof.proof_id // empty' proof.json)

          if [ "$PROOF_STATUS_CODE" -lt 200 ] || [ "$PROOF_STATUS_CODE" -gt 299 ] || [ "$PROOF_STATUS" != "VALID" ] || [ -z "$PROOF_ID" ]; then
            echo "Proof recording failed."
            echo "HTTP status: $PROOF_STATUS_CODE"
            cat proof.json
            exit 1
          fi

      - name: Upload governance records
        uses: actions/upload-artifact@v4
        with:
          name: governed-deploy-records
          path: |
            authority.json
            compile.json
            validate.json
            execute.json
            proof.json
