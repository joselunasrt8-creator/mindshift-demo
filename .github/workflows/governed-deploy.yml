name: governed-deploy

on:
  workflow_dispatch:
    inputs:
      decision_id:
        required: true
        type: string
      validated_object_hash:
        required: true
        type: string
      invocation_nonce:
        required: true
        type: string

concurrency:
  group: governed-deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DECISION_ID: ${{ github.event.inputs.decision_id }}
      VALIDATED_OBJECT_HASH: ${{ github.event.inputs.validated_object_hash }}
      INVOCATION_NONCE: ${{ github.event.inputs.invocation_nonce }}
      DEPLOY_ENVIRONMENT: production

    steps:
      - name: HARD FAIL — Missing critical inputs or secrets
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "NULL — Only explicit invocation allowed"
            exit 1
          fi

          for var in DECISION_ID VALIDATED_OBJECT_HASH INVOCATION_NONCE WORKER_URL API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "NULL — Missing required variable: $var"
              exit 1
            fi
          done

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "NULL — Invalid WORKER_URL"
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: VALIDATE — Fail closed unless exact VALID + exact hash + nonce reserved
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o validate.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/validate" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg decision_id "$DECISION_ID" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{decision_id: $decision_id, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce, environment: $environment}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Validation endpoint error"
            exit 1
          fi

          STATUS=$(jq -r '.status // empty' validate.json)
          RESULT=$(jq -r '.result // empty' validate.json)
          RETURNED_HASH=$(jq -r '.validated_object_hash // empty' validate.json)
          RETURNED_NONCE=$(jq -r '.invocation_nonce // empty' validate.json)

          if [ "$RESULT" != "VALID" ] || [ "$STATUS" != "VALID" ]; then
            echo "NULL — Validation failed"
            exit 1
          fi

          if [ -z "$RETURNED_HASH" ] || [ "$RETURNED_HASH" != "$VALIDATED_OBJECT_HASH" ]; then
            echo "NULL — Hash mismatch"
            exit 1
          fi

          if [ -z "$RETURNED_NONCE" ] || [ "$RETURNED_NONCE" != "$INVOCATION_NONCE" ]; then
            echo "NULL — Invocation nonce not accepted/reserved"
            exit 1
          fi

      - name: EXECUTE — Require exact validated object hash
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o execute.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/execute" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg decision_id "$DECISION_ID" \
              --arg intent "deploy_production" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg invocation_nonce "$INVOCATION_NONCE" \
              '{decision_id: $decision_id, intent: $intent, validated_object_hash: $validated_object_hash, invocation_nonce: $invocation_nonce}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Execute endpoint error"
            exit 1
          fi

          EXEC_STATUS=$(jq -r '.status // empty' execute.json)
          EXECUTION_ID=$(jq -r '.execution_id // empty' execute.json)

          if [ "$EXEC_STATUS" != "VALID" ] || [ -z "$EXECUTION_ID" ]; then
            echo "NULL — Execution failed"
            exit 1
          fi

          echo "EXECUTION_ID=$EXECUTION_ID" >> "$GITHUB_ENV"

      - name: PROOF — Required for production completion
        run: |
          set -euo pipefail

          RESPONSE_CODE=$(curl -sS -o proof.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/proof" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$(jq -n \
              --arg execution_id "$EXECUTION_ID" \
              --arg decision_id "$DECISION_ID" \
              --arg surface "github_actions" \
              --arg run_id "${{ github.run_id }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg workflow "governed-deploy.yml" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{execution_id: $execution_id, decision_id: $decision_id, surface: $surface, run_id: $run_id, commit_sha: $commit_sha, workflow: $workflow, environment: $environment}')")

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — Proof endpoint error"
            exit 1
          fi

          PROOF_STATUS=$(jq -r '.status // empty' proof.json)
          PROOF_ID=$(jq -r '.proof.proof_id // .proof_id // empty' proof.json)

          if [ "$PROOF_STATUS" != "VALID" ] || [ -z "$PROOF_ID" ]; then
            echo "NULL — Missing required proof"
            exit 1
          fi

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: governed-deploy-records
          path: |
            validate.json
            execute.json
            proof.json
