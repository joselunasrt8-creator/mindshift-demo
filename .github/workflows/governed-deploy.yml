name: governed-deploy

on:
  workflow_dispatch:
    inputs:
      decision_id:
        description: "MindShift decision identifier"
        required: true
        type: string
      validated_object_hash:
        description: "Validated object hash returned by MindShift"
        required: true
        type: string

concurrency:
  group: governed-deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  governed-production-deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}
      DEPLOY_ENVIRONMENT: production
      DECISION_ID: ${{ github.event.inputs.decision_id }}
      VALIDATED_OBJECT_HASH: ${{ github.event.inputs.validated_object_hash }}

    steps:
      - name: Enforce explicit invocation inputs
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Only explicit workflow_dispatch invocation is allowed."
            exit 1
          fi

          if [ -z "${DECISION_ID:-}" ] || [ -z "${VALIDATED_OBJECT_HASH:-}" ]; then
            echo "Missing required inputs: decision_id and validated_object_hash."
            exit 1
          fi

      - name: Require MindShift worker URL
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL secret."
            exit 1
          fi

          CLEAN_WORKER_URL="${WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "MINDSHIFT_WORKER_URL is invalid after normalization."
            exit 1
          fi

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"

      - name: Validate deploy gate (/validate)
        id: validate_gate
        run: |
          set -euo pipefail

          VALIDATE_STATUS_CODE=$(curl -sS -o validate.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/validate" \
            -D validate.headers \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY:-}" \
            -d "$(jq -n \
              --arg decision_id "$DECISION_ID" \
              --arg validated_object_hash "$VALIDATED_OBJECT_HASH" \
              --arg environment "$DEPLOY_ENVIRONMENT" \
              '{decision_id: $decision_id, validated_object_hash: $validated_object_hash, environment: $environment}')")

          VALIDATION_STATUS=$(jq -r '.status // empty' validate.json)
          VALIDATION_RESULT=$(jq -r '.result // empty' validate.json)

          if [ "$VALIDATE_STATUS_CODE" -lt 200 ] || [ "$VALIDATE_STATUS_CODE" -gt 299 ] || [ "$VALIDATION_STATUS" != "VALID" ] || [ "$VALIDATION_RESULT" != "VALID" ]; then
            echo "VALIDATION FAILED → DEPLOY BLOCKED"
            cat validate.json
            exit 1
          fi

          echo "VALIDATION PASSED → DEPLOY PROCEEDING"

      - name: Deploy production
        if: ${{ success() }}
        run: |
          set -euo pipefail
          echo "Production deploy is gated and can only proceed after successful MindShift validation."
          # Add governed production deployment command here.

      - name: Upload validation record
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: governed-deploy-records
          path: |
            validate.json
            validate.headers
