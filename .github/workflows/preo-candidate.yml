name: preo-candidate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  generate-preo-candidate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate reviewer legitimacy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          REPO="${{ github.repository }}"

          # Detect risk class for P3 authority check
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > pr_changed_files_tmp.txt
          QUICK_RISK_CLASS="$(bash scripts/classify-risk.sh pr_changed_files_tmp.txt)"

          # Fetch PR reviews
          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" > pr_reviews_tmp.json

          REVIEW_STATUS="UNVERIFIED"
          REVIEWER_LOGIN=""
          REVIEW_SUBMITTED_AT=""
          REVIEWED_HEAD_SHA=""
          STALE_REVIEW="false"
          AUTHORITY_ROLE_REQUIRED=""
          AUTHORITY_ROLE_VALID="false"
          REVIEW_AUTHORITY_RESULT="false"
          FAILURE_REASONS="[]"
          CHANGED_P3_FILES_JSON='[]'
          REVIEWER_SCOPE_PATHS_JSON='[]'
          SCOPE_COVERAGE_VALID="true"

          # A3: require APPROVED review where commit_id == current head SHA (object identity, not timestamp)
          APPROVED_ON_HEAD=$(jq -c \
            --arg author "$PR_AUTHOR" \
            --arg head_sha "$HEAD_SHA" \
            '[.[] | select(.state == "APPROVED" and .user.login != $author and .commit_id == $head_sha)] | last' \
            pr_reviews_tmp.json)

          if [ "$APPROVED_ON_HEAD" != "null" ] && [ -n "$APPROVED_ON_HEAD" ]; then
            REVIEWER_LOGIN=$(echo "$APPROVED_ON_HEAD" | jq -r '.user.login')
            REVIEW_SUBMITTED_AT=$(echo "$APPROVED_ON_HEAD" | jq -r '.submitted_at')
            REVIEWED_HEAD_SHA=$(echo "$APPROVED_ON_HEAD" | jq -r '.commit_id')

            if [ "$QUICK_RISK_CLASS" = "P3" ]; then
              AUTHORITY_ROLE_REQUIRED="sovereignty_review"
              HAS_AUTHORITY=$(jq --arg reviewer "$REVIEWER_LOGIN" \
                '(.authority_roles.sovereignty_review // []) | map(select(.login == $reviewer)) | length > 0' \
                governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)
              if [ "$HAS_AUTHORITY" = "true" ]; then
                # AC5: path-scope coverage — every changed P3 file must match a reviewer scope_path
                REVIEWER_SCOPE_PATHS_JSON=$(jq -c --arg reviewer "$REVIEWER_LOGIN" \
                  '(.authority_roles.sovereignty_review // []) | map(select(.login == $reviewer)) | .[0].scope_paths // []' \
                  governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)

                CHANGED_P3_FILES_ARR=()
                while IFS= read -r chfile; do
                  while IFS= read -r p3pat; do
                    if [[ "$chfile" == $p3pat ]]; then
                      CHANGED_P3_FILES_ARR+=("$chfile")
                      break
                    fi
                  done < <(jq -r '.rules[] | select(.risk == "P3") | .patterns[]' \
                    governance/merge-legitimacy/RISK_CLASSIFICATION_RULES.json)
                done < pr_changed_files_tmp.txt

                if [ "${#CHANGED_P3_FILES_ARR[@]}" -gt 0 ]; then
                  CHANGED_P3_FILES_JSON=$(printf '%s\n' "${CHANGED_P3_FILES_ARR[@]}" | jq -R . | jq -s .)
                fi

                SCOPE_COVERAGE_VALID="true"
                if [ "${#CHANGED_P3_FILES_ARR[@]}" -gt 0 ]; then
                  for p3file in "${CHANGED_P3_FILES_ARR[@]}"; do
                    COVERED="false"
                    while IFS= read -r spath; do
                      if [[ "$p3file" == $spath ]]; then
                        COVERED="true"
                        break
                      fi
                    done < <(echo "$REVIEWER_SCOPE_PATHS_JSON" | jq -r '.[]')
                    if [ "$COVERED" = "false" ]; then
                      SCOPE_COVERAGE_VALID="false"
                      break
                    fi
                  done
                fi

                if [ "$SCOPE_COVERAGE_VALID" = "true" ]; then
                  AUTHORITY_ROLE_VALID="true"
                  REVIEW_AUTHORITY_RESULT="true"
                  REVIEW_STATUS="APPROVED"
                else
                  FAILURE_REASONS='["p3_files_outside_reviewer_scope"]'
                  REVIEW_STATUS="LEGITIMACY_NULL"
                fi
              else
                SCOPE_COVERAGE_VALID="false"
                FAILURE_REASONS='["reviewer_not_in_sovereignty_review_for_p3"]'
                REVIEW_STATUS="LEGITIMACY_NULL"
              fi
            else
              AUTHORITY_ROLE_VALID="true"
              REVIEW_AUTHORITY_RESULT="true"
              REVIEW_STATUS="APPROVED"
            fi
          else
            ANY_APPROVED=$(jq --arg author "$PR_AUTHOR" \
              '[.[] | select(.state == "APPROVED" and .user.login != $author)] | length' \
              pr_reviews_tmp.json)
            if [ "$ANY_APPROVED" -gt 0 ]; then
              STALE_REVIEW="true"
              LATEST_ANY=$(jq -c --arg author "$PR_AUTHOR" \
                '[.[] | select(.state == "APPROVED" and .user.login != $author)] | sort_by(.submitted_at) | last' \
                pr_reviews_tmp.json)
              REVIEWER_LOGIN=$(echo "$LATEST_ANY" | jq -r '.user.login')
              REVIEW_SUBMITTED_AT=$(echo "$LATEST_ANY" | jq -r '.submitted_at')
              REVIEWED_HEAD_SHA=$(echo "$LATEST_ANY" | jq -r '.commit_id')
              FAILURE_REASONS='["reviewed_head_sha_mismatch"]'
              REVIEW_STATUS="LEGITIMACY_NULL"
            else
              IS_SELF_CERTIFIER=$(jq --arg author "$PR_AUTHOR" \
                '(.single_contributor_policy.permitted_self_certifiers // []) | map(select(. == $author)) | length > 0' \
                governance/merge-legitimacy/MERGE_ACTOR_REGISTRY.json)
              if [ "$IS_SELF_CERTIFIER" = "true" ]; then
                REVIEWER_LOGIN="$PR_AUTHOR"
                REVIEWED_HEAD_SHA="$HEAD_SHA"
                AUTHORITY_ROLE_REQUIRED="single_contributor_self_certification"
                AUTHORITY_ROLE_VALID="true"
                REVIEW_AUTHORITY_RESULT="true"
                REVIEW_STATUS="OWNER_SELF_CERTIFIED"
              else
                FAILURE_REASONS='["no_approved_review_from_non_author"]'
                REVIEW_STATUS="LEGITIMACY_NULL"
              fi
            fi
          fi

          CANONICAL_INPUTS=$(jq -cn \
            --argjson pr_number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg reviewer "$REVIEWER_LOGIN" \
            --arg reviewed_head_sha "$REVIEWED_HEAD_SHA" \
            --arg risk_class "$QUICK_RISK_CLASS" \
            --arg review_status "$REVIEW_STATUS" \
            --argjson scope_coverage_valid "$([ "$SCOPE_COVERAGE_VALID" = "true" ] && echo "true" || echo "false")" \
            '{pr_number: $pr_number, head_sha: $head_sha, reviewer: $reviewer, reviewed_head_sha: $reviewed_head_sha, risk_class: $risk_class, review_status: $review_status, scope_coverage_valid: $scope_coverage_valid}')
          CANONICAL_INPUT_HASH=$(echo "$CANONICAL_INPUTS" | sha256sum | cut -d' ' -f1)

          jq -n \
            --arg version "1.0" \
            --argjson pr_number "$PR_NUMBER" \
            --arg reviewer "$REVIEWER_LOGIN" \
            --arg review_submitted_at "$REVIEW_SUBMITTED_AT" \
            --arg reviewed_head_sha "$REVIEWED_HEAD_SHA" \
            --arg current_head_sha "$HEAD_SHA" \
            --arg risk_class "$QUICK_RISK_CLASS" \
            --arg authority_role_required "$AUTHORITY_ROLE_REQUIRED" \
            --argjson authority_role_valid "$AUTHORITY_ROLE_VALID" \
            --argjson reviewer_is_author false \
            --argjson stale_review "$STALE_REVIEW" \
            --argjson review_authority_result "$REVIEW_AUTHORITY_RESULT" \
            --arg review_status "$REVIEW_STATUS" \
            --arg canonical_input_hash "$CANONICAL_INPUT_HASH" \
            --argjson failure_reasons "$FAILURE_REASONS" \
            --argjson changed_p3_files "$CHANGED_P3_FILES_JSON" \
            --argjson reviewer_scope_paths "$REVIEWER_SCOPE_PATHS_JSON" \
            --argjson scope_coverage_valid "$([ "$SCOPE_COVERAGE_VALID" = "true" ] && echo "true" || echo "false")" \
            '{
              version: $version,
              pr_number: $pr_number,
              reviewer: $reviewer,
              review_submitted_at: $review_submitted_at,
              reviewed_head_sha: $reviewed_head_sha,
              current_head_sha: $current_head_sha,
              risk_class: $risk_class,
              authority_role_required: $authority_role_required,
              authority_role_valid: $authority_role_valid,
              reviewer_is_author: $reviewer_is_author,
              stale_review: $stale_review,
              review_authority_result: $review_authority_result,
              review_status: $review_status,
              canonical_input_hash: $canonical_input_hash,
              failure_reasons: $failure_reasons,
              changed_p3_files: $changed_p3_files,
              reviewer_scope_paths: $reviewer_scope_paths,
              scope_coverage_valid: $scope_coverage_valid
            }' > review_legitimacy_result.json

          LEGITIMACY_RESULT_HASH=$(sha256sum review_legitimacy_result.json | cut -d' ' -f1)

          echo "REVIEW_STATUS=$REVIEW_STATUS" >> "$GITHUB_ENV"
          echo "LEGITIMACY_RESULT_HASH=$LEGITIMACY_RESULT_HASH" >> "$GITHUB_ENV"
          echo "reviewer_legitimacy_status=$REVIEW_STATUS"

      - name: Generate PREO candidate
        run: |
          set -euo pipefail

          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt

          GOVERNED_PATH_DETECTED="false"
          while IFS= read -r file; do
            case "$file" in
              governance/*|.github/workflows/*|src/*|schema.sql|migrations/*|wrangler.toml)
                GOVERNED_PATH_DETECTED="true"
                ;;
            esac
          done < changed_files.txt

          RISK_CLASS="$(bash scripts/classify-risk.sh changed_files.txt)"

          jq -n \
            --arg preo_id "PREO-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --arg repo "${{ github.repository }}" \
            --arg base_branch "${{ github.base_ref }}" \
            --arg head_branch "${{ github.head_ref }}" \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg review_status "${REVIEW_STATUS:-UNVERIFIED}" \
            --arg checks_status "UNVERIFIED" \
            --arg risk_class "$RISK_CLASS" \
            --arg governed_path_detected "$GOVERNED_PATH_DETECTED" \
            --arg created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile changed_files <(jq -R . changed_files.txt | jq -s .) \
            '{
              preo_id: $preo_id,
              pr_number: $pr_number,
              repo: $repo,
              base_branch: $base_branch,
              head_branch: $head_branch,
              head_sha: $head_sha,
              changed_files: $changed_files[0],
              review_status: $review_status,
              checks_status: $checks_status,
              risk_class: $risk_class,
              governed_path_detected: ($governed_path_detected == "true"),
              created_at: $created_at,
              status: "PREO_CANDIDATE"
            }' > PREO_CANDIDATE.json

          cat PREO_CANDIDATE.json

      - name: Validate PREO candidate shape
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const preo = JSON.parse(readFileSync('PREO_CANDIDATE.json', 'utf8'));

          for (const field of [
            'preo_id',
            'pr_number',
            'repo',
            'base_branch',
            'head_branch',
            'head_sha',
            'changed_files',
            'review_status',
            'checks_status',
            'risk_class',
            'created_at',
            'status',
          ]) {
            assert.ok(Object.hasOwn(preo, field), `PREO candidate missing field: ${field}`);
          }

          assert.equal(preo.status, 'PREO_CANDIDATE');
          assert.ok(Array.isArray(preo.changed_files), 'changed_files must be an array');
          assert.ok(String(preo.head_sha).length > 0, 'head_sha must be non-empty');
          NODE

      - name: Upload PREO candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: PREO_CANDIDATE
          path: |
            PREO_CANDIDATE.json
            review_legitimacy_result.json

      - name: Emit PREO summary
        run: |
          set -euo pipefail
          {
            echo "### PREO Candidate"
            echo ""
            echo "reviewer_legitimacy_status=${REVIEW_STATUS:-UNVERIFIED}"
            echo ""
            echo '```json'
            cat PREO_CANDIDATE.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
