name: mindshift-validate-pr

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    name: mindshift-validate-pr
    runs-on: ubuntu-latest

    env:
      MINDSHIFT_WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
      MINDSHIFT_API_KEY: ${{ secrets.MINDSHIFT_API_KEY }}

    steps:
      - name: HARD FAIL — Production input explicitly rejected
        run: |
          set -euo pipefail

          if [ "${{ github.event.pull_request.base.ref }}" = "production" ] || [ "${{ github.event.pull_request.head.ref }}" = "production" ]; then
            echo "NULL — Production is only allowed via governed-deploy.yml"
            exit 1
          fi
      - name: HARD FAIL — Missing secrets and context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "NULL — Unsupported event: $EVENT_NAME"
            exit 1
          fi

          if [ -z "${MINDSHIFT_WORKER_URL:-}" ]; then
            echo "NULL — Missing required secret MINDSHIFT_WORKER_URL. Configure it in repository or organization Actions secrets."
            exit 1
          fi

          if [ -z "${MINDSHIFT_API_KEY:-}" ]; then
            echo "NULL — Missing required secret MINDSHIFT_API_KEY. Configure it in repository or organization Actions secrets."
            exit 1
          fi

          CLEAN_WORKER_URL="${MINDSHIFT_WORKER_URL%/}"
          if [ -z "$CLEAN_WORKER_URL" ]; then
            echo "NULL — Invalid MINDSHIFT_WORKER_URL"
            exit 1
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "NULL — Missing required pull_request.number context"
            exit 1
          fi

          if [ -z "$COMMIT_SHA" ]; then
            echo "NULL — Missing required pull_request.head.sha context"
            exit 1
          fi

          for field in REPO PR_NUMBER BASE_BRANCH HEAD_BRANCH COMMIT_SHA; do
            if [ -z "${!field}" ]; then
              echo "NULL — Empty required payload field: $field"
              exit 1
            fi
          done

          echo "CLEAN_WORKER_URL=$CLEAN_WORKER_URL" >> "$GITHUB_ENV"
          echo "REPO=$REPO" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "BASE_BRANCH=$BASE_BRANCH" >> "$GITHUB_ENV"
          echo "HEAD_BRANCH=$HEAD_BRANCH" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$COMMIT_SHA" >> "$GITHUB_ENV"

      - name: AUTHORITY CHECK — Merge PR intent (fail closed)
        run: |
          set -euo pipefail

          AUTHORITY_PAYLOAD=$(jq -n \
            --arg pr_number "$PR_NUMBER" \
            '{owner:"github_workflow", intent:"merge_pull_request", scope:{pr_number:$pr_number}, constraints:{repo:"joselunasrt8-creator/mindshift-demo", branch:"main", workflow:"governed-deploy.yml", max_executions:1}}')

          echo "Authority payload:"
          echo "$AUTHORITY_PAYLOAD"

          AUTHORITY_CODE=$(curl -sS -o authority.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/authority" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $MINDSHIFT_API_KEY" \
            -d "$AUTHORITY_PAYLOAD")

          echo "Authority response (HTTP $AUTHORITY_CODE):"
          cat authority.json

          if [ "$AUTHORITY_CODE" -lt 200 ] || [ "$AUTHORITY_CODE" -gt 299 ]; then
            echo "NULL — Authority endpoint error"
            exit 1
          fi

      - name: VALIDATE PR — Fail closed
        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg pr_number "$PR_NUMBER" \
            --arg base_branch "$BASE_BRANCH" \
            --arg head_branch "$HEAD_BRANCH" \
            --arg commit_sha "$COMMIT_SHA" \
            '{repo: $repo, pr_number: $pr_number, base_branch: $base_branch, head_branch: $head_branch, commit_sha: $commit_sha}')

          RESPONSE_CODE=$(curl -sS -o pr-validate.json -w "%{http_code}" \
            -X POST "$CLEAN_WORKER_URL/validate-pr" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $MINDSHIFT_API_KEY" \
            -d "$PAYLOAD")

          echo "PR validation response (HTTP $RESPONSE_CODE):"
          cat pr-validate.json

          if [ "$RESPONSE_CODE" -lt 200 ] || [ "$RESPONSE_CODE" -gt 299 ]; then
            echo "NULL — PR validation endpoint error"
            exit 1
          fi

          STATUS=$(jq -r '.status // empty' pr-validate.json)
          RESULT=$(jq -r '.result // empty' pr-validate.json)

          if [ "$STATUS" != "VALID" ] || [ "$RESULT" != "VALID" ]; then
            echo "NULL — PR validation failed"
            exit 1
          fi

          echo "VALID — PR allowed"
