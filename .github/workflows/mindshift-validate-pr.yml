name: mindshift-validate-pr

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: mindshift-validate-pr
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR through MindShift gate
        env:
          WORKER_URL: ${{ secrets.MINDSHIFT_WORKER_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ -z "${WORKER_URL:-}" ]; then
            echo "Missing MINDSHIFT_WORKER_URL secret."
            exit 1
          fi

          CLEAN_WORKER_URL="${WORKER_URL%/}"

          STATUS_CODE=$(curl -sS -o validate-pr.json -w "%{http_code}" -X POST "$CLEAN_WORKER_URL/validate-pr" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "$REPO" \
              --arg branch "$BRANCH" \
              --arg head_sha "$HEAD_SHA" \
              --arg pr_number "$PR_NUMBER" \
              '{repo: $repo, branch: $branch, head_sha: $head_sha, pr_number: $pr_number}')")

          RESPONSE_STATUS=$(jq -r '.status // empty' validate-pr.json)
          RESPONSE_RESULT=$(jq -r '.result // empty' validate-pr.json)

          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -gt 299 ] || [ "$RESPONSE_STATUS" != "VALID" ] || [ "$RESPONSE_RESULT" != "VALID" ]; then
            echo "MindShift PR validation failed; blocking merge."
            cat validate-pr.json
            exit 1
          fi

          echo "MindShift PR validation passed."
